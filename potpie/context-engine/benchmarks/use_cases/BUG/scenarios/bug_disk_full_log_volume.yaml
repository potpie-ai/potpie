id: bug_disk_full_log_volume
use_case: BUG
tier: extended
difficulty: easy
source_mix: dual
universe: acme

description: |
  A checkout-api prod node is at 95% disk with /var/log growing ~2GB/hour —
  log volume is ~20x normal and started right after the most recent deploy.

  Ground truth: someone set `LOG_LEVEL=debug` while chasing the idempotency
  issue and it shipped to prod. ADR-021 is explicit: debug level is dev-only
  and must NEVER be enabled in prod. A #incidents thread diagnoses it (the
  auth/checkout lead points at the debugging PR and ADR-021, notes this is the
  second time a debug flag escaped to prod, and rotates logs).

  A strong answer identifies the cause as debug logging enabled in prod
  (violating ADR-021), recommends reverting LOG_LEVEL to info + rotating
  /var/log, and — unprompted — flags the convention violation and the
  recurrence (a guard should prevent debug in prod Helm values).

  Easy tier: alerting + slack. The interesting bit is connecting the symptom
  to a preference (ADR-021) the engine should surface.

ingest:
  - { event: alerting/bug_disk_full_alert.json, at: "0d", tags: [signal] }
  - { event: slack/bug_disk_full_thread.json, at: "0d", tags: [signal] }

distractor_events:
  - { event: noise/alerting_noise_template.json, at: "-30d..-2d", count: 3 }

post_ingest_assertions:
  # NOTE (read-layer gating): Alert/Decision nodes are reconciled but the
  # topology read surfaces only Service/DataStore. The symptom→preference
  # link is graded in retrieval + judge. Anchor on checkout-api.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: checkout-api, environment: prod }
  include: [prior_bugs, infra_topology, timeline]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  source_refs_min: 1
  must_cite_event_id:
    - alerting/bug_disk_full_alert.json
  forbid_in_answer:
    - "I don't have information"

judge:
  pass_score: 75
  criteria:
    - name: identifies_root_cause
      weight: 35
      pass_threshold: 4
      prompt: |
        Does the answer identify the cause as debug-level logging enabled in
        prod (LOG_LEVEL=debug from the recent debugging deploy) filling the
        disk — not a generic "disk full, add storage"?
    - name: cites_preference
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer connect this to ADR-021's rule that debug logging is
        dev-only and must never run in prod — i.e. surface the convention the
        deploy violated?
    - name: actionable_first_steps
      weight: 20
      pass_threshold: 3
      prompt: |
        Does the answer recommend reverting LOG_LEVEL to info and rotating
        /var/log, ideally plus a guard so debug can't be set in prod Helm
        values?
    - name: no_hallucination
      weight: 20
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid references: checkout-api, LOG_LEVEL,
        debug, ADR-021, /var/log, bench-user-1, bench-user-5. Other
        services/people/files are hallucinations.
