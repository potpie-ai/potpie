id: bug_n_plus_one_query
use_case: BUG
tier: extended
difficulty: medium
source_mix: dual
universe: acme

description: |
  inventory-svc's new `GET /warehouses/{id}/stock` endpoint (PR #1188) is
  slow under load — p95 ~3.5s when a warehouse has many SKUs, with a burst
  of small SELECTs per request and inventory-prod-db CPU spiking. Single-SKU
  warehouses are fast. A new engineer files OPS-460.

  Ground truth: this is an N+1 query, the same root-cause class as OPS-280.
  Back then `GET /reservations` lazy-loaded each row's warehouse + sku inside
  the serializer (1+2N queries, p95 4.2s). PR #861 fixed it with
  `selectinload` eager loading (3 queries total, p95 180ms) and added the
  rule: list endpoints must eager-load the relationships they serialize.

  A strong answer recognises the N+1 (response time scales with row count =
  per-row lazy queries), surfaces OPS-280 + PR #861's selectinload fix, and
  recommends eager-loading the serialized relationships on the new endpoint.

  Medium tier: linear + github, moderate distractors.

ingest:
  - { event: linear/bug_nplus1_prior.json, at: "-170d", tags: [signal] }
  - { event: github/bug_nplus1_fix.json, at: "-168d", tags: [signal] }
  - { event: linear/bug_nplus1_today.json, at: "0d", tags: [signal] }

distractor_events:
  - { event: noise/linear_issue_noise_template.json, at: "-90d..-2d", count: 10 }

post_ingest_assertions:
  # NOTE (read-layer gating): Issue/PR nodes are reconciled but the topology
  # read surfaces only Service/DataStore. Case retrieval graded in retrieval
  # + judge. Anchor on inventory-svc.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*inventory-svc", min_count: 1 }
    - { label: DataStore, key_pattern: "datastore:.*inventory-prod-db", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: inventory-svc }
  include: [prior_bugs, infra_topology, timeline]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [prior_bugs]
  source_refs_min: 2
  must_cite_event_id:
    - linear/bug_nplus1_prior.json
    - github/bug_nplus1_fix.json
  forbid_in_answer:
    - "I don't have information"
    - "no prior incidents"

judge:
  pass_score: 65
  criteria:
    - name: surfaces_prior_incident
      weight: 30
      pass_threshold: 4
      prompt: |
        Does the answer reference OPS-280 (the prior inventory-svc N+1 on
        GET /reservations) by identifier and surface PR #861's selectinload
        eager-loading fix?
    - name: identifies_recurrence_pattern
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer correctly diagnose today's symptom as an N+1 query
        (response time + query count scale with the number of SKUs/rows
        because relationships are lazy-loaded per row), matching the OPS-280
        root-cause class?
    - name: actionable_first_steps
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer recommend eager-loading the serialized relationships
        on the new endpoint (selectinload/joinedload), per the rule from the
        prior fix — not a vague "optimise the query"?
    - name: no_hallucination
      weight: 20
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid references: OPS-280, OPS-460, PR #861,
        PR #1188, selectinload, inventory-svc, inventory-prod-db,
        bench-user-2, bench-user-17. Other PRs/services/people are
        hallucinations.
