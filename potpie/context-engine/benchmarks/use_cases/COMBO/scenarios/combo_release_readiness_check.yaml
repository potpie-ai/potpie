id: combo_release_readiness_check
use_case: COMBO
tier: quick
difficulty: medium
source_mix: full
universe: acme
dimensions: [TIME, INFRA]

description: |
  A release manager asks the agent: "Is checkout-api safe to release
  today?"

  A trustworthy go/no-go answer is a composite:

    - TIME side:  what has changed since the last release. In the last
                  7 days checkout-api merged PR #1238 (payments-svc retry
                  with backoff), PR #1242 (a checkout-prod-db partial
                  index migration with DBA sign-off), and PR #1151 (OTEL
                  telemetry spans). The agent must summarise these recent
                  changes — not the full history.
    - INFRA side: the blast radius. checkout-api fans out to inventory-svc,
                  payments-svc, notifications-svc, auth-svc, plus
                  checkout-prod-db (Postgres) and kafka(orders-topic). The
                  retry PR amplifies load on payments-svc; the index PR
                  touches checkout-prod-db. The deploy path is ArgoCD
                  prod after staging. And there is a currently-OPEN p99
                  latency alert on checkout-api in prod.

  Failure modes:
    - Lists recent PRs but never reasons about which downstreams they
      could impact → INFRA fails.
    - Describes the topology but never grounds the decision in what
      actually changed recently, or pulls in stale changes outside the
      window → TIME fails.
    - Gives a green light without flagging the open p99 alert →
      operationally wrong and the integration criterion fails.

  `by_dimension` splits this into a TIME score (recent-change summary)
  and an INFRA score (dependency blast radius).

ingest:
  # Recent checkout-api changes (TIME), all within the 7-day window.
  - { event: github/pr_merged__1151__checkout_telemetry.json, at: "-7d", tags: [signal] }
  - { event: github/pr_merged__1238__checkout_retry_backoff.json, at: "-4d", tags: [signal] }
  - { event: github/pr_merged__1242__checkout_orders_index.json, at: "-1d", tags: [signal] }
  # Deploy path / current prod state (INFRA).
  - { event: deploy/checkout_prod_deploy_r7a3.json, at: "-6d", tags: [signal] }
  # Currently-open alert (INFRA / operational).
  - { event: alerting/checkout_p99_latency_open.json, at: "-3h", tags: [signal] }

distractor_events:
  - { event: "noise/github_chore_noise_template.json", at: "-7d..-1d", count: 15, shape: "noise/random" }
  - { event: "noise/alerting_noise_template.json", at: "-7d..-1d", count: 10, shape: "noise/random" }

post_ingest_assertions:
  # NOTE (read-layer gating): INFRA is the structurally-gradeable
  # dimension — the topology read surfaces Service / DataStore +
  # DEPENDS_ON / USES, so we anchor structural assertions there. The TIME
  # dimension (recent PR / Deploy / Alert events) is reconciled but not
  # returned by the topology read path, so it is graded via the synthesis
  # judge + retrieval_assertions instead.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
    - { label: DataStore, key_pattern: "datastore:.*checkout-prod-db", min_count: 1 }
  graph_must_contain_edges:
    - { from_label: Service, to_label: Service, type: DEPENDS_ON, min_count: 1, dimensions: [INFRA] }
    - { from_label: Service, to_label: DataStore, type: USES, min_count: 1, dimensions: [INFRA] }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: review
  scope: { service: checkout-api, action: release_readiness }
  include: [timeline, infra_topology, decisions, owners, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline, infra_topology]
  source_refs_min: 3
  must_cite_event_id:
    - github/pr_merged__1238__checkout_retry_backoff.json
    - github/pr_merged__1242__checkout_orders_index.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/alerting_noise_template.json
  temporal:
    window: { from: "-7d", to: "0d" }
    out_of_window_refs_max: 2
  forbid_in_answer:
    - "I don't have information"
    - "no recent changes"

judge:
  pass_score: 65
  criteria:
    # TIME side ---
    - name: summarizes_recent_changes
      weight: 25
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer summarise the checkout-api changes since the last
        release — the payments-svc retry/backoff (PR #1238), the
        checkout-prod-db partial-index migration (PR #1242), and the OTEL
        telemetry spans (PR #1151) — scoped to the recent window rather
        than reciting the whole history? Missing the substantive PRs
        (#1238, #1242) fails.
    # INFRA side ---
    - name: dependency_blast_radius
      weight: 25
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer reason about which downstreams these changes could
        impact — e.g. the retry PR amplifies call volume to payments-svc,
        the index migration touches checkout-prod-db — using checkout-api's
        actual dependency set (inventory-svc, payments-svc,
        notifications-svc, auth-svc, checkout-prod-db, kafka orders-topic)?
        A change list with no impact reasoning fails.
    - name: deploy_path_awareness
      weight: 10
      pass_threshold: 2
      dimensions: [INFRA]
      prompt: |
        Does the answer reflect the deploy path — ArgoCD-managed prod
        promotion after staging (the checkout-api-prod app), consistent
        with the recent prod deploy? Bonus for noting the DB migration in
        PR #1242 must be deploy-safe.
    # Cross-dimension integration ---
    - name: flags_open_alert_in_verdict
      weight: 25
      pass_threshold: 4
      prompt: |
        Does the answer surface the currently-OPEN p99 latency alert on
        checkout-api (prod, ~1.4s vs 900ms SLO) and let it shape the
        go/no-go verdict — i.e. it does NOT give an unqualified green
        light while an unresolved latency regression is firing? A clean
        "safe to release" that ignores the open alert fails.
    - name: coherent_go_no_go
      weight: 15
      pass_threshold: 3
      prompt: |
        Does the answer deliver a single coherent release verdict that
        weighs the recent changes against the topology risk and the open
        alert, rather than two disconnected lists? Are all claims grounded
        (valid: PR #1151, #1238, #1242, checkout-api, payments-svc,
        inventory-svc, checkout-prod-db, kafka orders-topic, bench-user-1,
        bench-user-6)? Invented PRs/SHAs/services fail.
