id: combo_incident_to_prevention
use_case: COMBO
tier: extended
difficulty: hard
source_mix: full
universe: acme
dimensions: [BUG, PREF]

description: |
  After OPS-389 self-recovers, an engineering manager asks the agent:
  "We just had OPS-389 — what policy should have prevented it, and is it
  being followed?"

  This question forces a join across a bug lens and a preference/policy
  lens, and the punchline is that the policy existed but was not enforced:

    - BUG side:   OPS-389 (inventory-svc pool exhaustion) is a recurrence
                  of OPS-218 (checkout-api, ~90 days earlier) — same
                  failure class, triggered by a worker-fleet expansion
                  outrunning the DB pool ceiling. The OPS-220 postmortem
                  recorded the lesson.
    - PREF side:  the preventive policy is ADR-045 — the +25% fleet-
                  expansion rule requiring a pool-ceiling check and DBA
                  sign-off (formalised from OPS-220). The agent must cite
                  it as the policy that SHOULD have caught this.
    - The join:   PR #1240 expanded inventory-svc workers 18 -> 24, which
                  is +33% — over the +25% threshold — and it merged with
                  no DBA sign-off. The notion incident-review page records
                  this violation. So the policy exists and is correct, but
                  was NOT followed; the answer must say so.

  Failure modes:
    - Recounts the incident but never names the preventive policy →
      PREF fails.
    - Cites ADR-045 but never connects it to the actual OPS-389/OPS-218
      recurrence → BUG fails.
    - States the policy and the incident but misses that the +33%
      expansion violated it → the integration criterion fails (this is
      the whole point of the question).

  `by_dimension` splits this into a BUG score (incident + recurrence) and
  a PREF score (the preventive policy), with the violation as the
  integrating criterion.

ingest:
  # Prior incident + postmortem (BUG) that produced the lesson.
  - { event: linear/issue_create__OPS-218.json, at: "-90d", tags: [signal] }
  - { event: linear/issue_create__OPS-220__postmortem.json, at: "-80d", tags: [signal] }
  # The change that broke the rule, then today's recurrence (BUG/join).
  - { event: github/pr_merged__1240__inventory_worker_scale.json, at: "-2d", tags: [signal] }
  - { event: linear/issue_create__OPS-389.json, at: "-6h", tags: [signal] }
  # The incident-review page recording the policy violation (PREF/join).
  - { event: notion/ops389_incident_review.json, at: "-1h", tags: [signal] }

distractor_events:
  - { event: "noise/linear_issue_noise_template.json", at: "-60d..-1d", count: 18, shape: "noise/random" }
  - { event: "noise/github_chore_noise_template.json", at: "-60d..-1d", count: 14, shape: "noise/random" }

post_ingest_assertions:
  # NOTE (read-layer gating): neither declared dimension is structurally
  # gradeable. BUG (Issue / Decision recurrence: OPS-218 <-> OPS-389) and
  # PREF (ADR-045 Decision / Document) are reconciled but the topology read
  # surfaces only Service / DataStore + DEPENDS_ON / USES, not Issue /
  # Decision / Document tiers — a structural assertion on them would grade a
  # read-layer gap. The incident->policy->violation synthesis is graded by
  # the judge + retrieval_assertions. We anchor the structural floor on the
  # services the incidents touch, which the topology read does surface.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*(inventory-svc|checkout-api)", min_count: 1 }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: planning
  scope: { service: inventory-svc, incident: OPS-389, question: "preventive policy + adherence" }
  include: [prior_bugs, coding_preferences, decisions, owners, docs]
  mode: deep
  source_policy: summary

retrieval_assertions:
  required_includes_used: [prior_bugs, coding_preferences]
  source_refs_min: 3
  must_cite_event_id:
    - linear/issue_create__OPS-220__postmortem.json
    - universe/acme/25-adr-045-db-migrations.json
  must_not_cite_event_id:
    - noise/linear_issue_noise_template.json
    - noise/github_chore_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no relevant policy"
    - "no prior incidents"

judge:
  pass_score: 55
  criteria:
    # BUG side ---
    - name: surfaces_prior_incident_recurrence
      weight: 25
      pass_threshold: 4
      dimensions: [BUG]
      prompt: |
        Does the answer surface that OPS-389 is a recurrence of OPS-218
        (same Postgres pool-exhaustion failure class, ~90 days apart,
        each triggered by a worker-fleet expansion) and reference the
        OPS-220 postmortem that captured the lesson? Naming OPS-218 /
        OPS-220 explicitly is required.
    # PREF side ---
    - name: cites_preventive_policy
      weight: 25
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer name the preventive policy — ADR-045's +25%
        fleet-expansion rule requiring a pool-ceiling check and DBA
        sign-off (bench-user-6) — as the thing that should have caught
        this before merge? Generic "should have reviewed more carefully"
        without the +25% / ADR-045 specifics fails.
    - name: explains_policy_mechanism
      weight: 15
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer explain HOW the policy is meant to work — DBA as
        required reviewer (CODEOWNERS on migrations / worker-count Helm
        values), with the pool-ceiling math computed before merge — rather
        than just naming ADR-045 as a label?
    # Cross-dimension integration ---
    - name: identifies_policy_violation
      weight: 25
      pass_threshold: 4
      prompt: |
        Does the answer identify that the policy was NOT followed —
        PR #1240's 18 -> 24 expansion is +33%, over the +25% threshold,
        and merged with no DBA sign-off — i.e. the policy exists and is
        correct but the enforcement gap let the change through? This is
        the crux of the question; an answer that states the policy and the
        incident but never says it was violated fails.
    - name: grounded_no_hallucination
      weight: 10
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid identifiers: OPS-218, OPS-220,
        OPS-389, PR #1240, PR #1244, PR #875, PR #892, ADR-045, ADR-021,
        inventory-svc, checkout-api, inventory-prod-db, bench-user-2,
        bench-user-6. Invented ADRs, PRs, SHAs, percentages, or people
        fail this criterion.
