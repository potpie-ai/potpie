id: pref_error_handling_subclass
use_case: PREF
tier: quick
difficulty: easy
source_mix: dual
universe: acme

description: |
  An engineer is adding a new lookup endpoint to checkout-api
  (`GET /orders/{order_id}`) and asks the agent how this team wants
  errors raised and responses typed. Two sources reinforce the same
  normative rule:

    - ADR-007 (`docs/adr/007-fastapi-handler-conventions.md`) — the
      canonical decision: every handler declares `response_model=...`,
      errors are raised as `AcmeError` subclasses (never bare
      `Exception`/`HTTPException`), and handlers are `async def`.
      Statically enforced as acme-lint rules ACME001-ACME004.
    - A recent GitHub PR review comment (#1203) where bench-user-1, the
      checkout lead, requests changes on a near-identical endpoint that
      did `raise Exception("order not found")` and returned an untyped
      dict — citing ACME002 (bare Exception), ACME001 (missing
      response_model), and ACME003 (sync handler).

  Ground truth the answer must surface: raise an `AcmeError` subclass
  (e.g. `OrderNotFoundError`) defined in `acme.errors`, not bare
  `Exception` — because the global handler in `acme.web.errors` only
  maps `AcmeError` to the canonical error shape; and declare
  `response_model=OrderResponse`. The ADR is the policy; the PR review
  is the lived enforcement of that exact policy on this exact endpoint
  shape.

  Why it's hard despite being "easy": the engine must connect a policy
  document (ADR-007) to an independent enforcement event (a PR review
  comment) and recognise they describe the same rule, then translate it
  into concrete guidance for a new, third endpoint — not just quote the
  ADR.

ingest:
  - { event: github/pref_review__1203__bare_exception_rejected.json, at: "-17d", tags: [signal] }

post_ingest_assertions:
  # NOTE (read-layer gating): the preference tier (ADR-007 Document /
  # Decision and the PR-review enforcement event) is reconciled, but the
  # current topology query/read path surfaces only topology entities
  # (Service / DataStore + DEPENDS_ON / USES), not Document/Decision/Person
  # nodes — so the ADR and the review cannot be asserted structurally yet.
  # Whether the convention actually surfaces is graded in the synthesis
  # judge below. We anchor the structural floor on the checkout-api Service
  # the new endpoint targets (readable topology from the universe seed).
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: feature
  scope: { service: checkout-api }
  include: [coding_preferences, decisions, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [coding_preferences]
  source_refs_min: 2
  must_cite_event_id:
    - universe/acme/21-adr-007-fastapi-handlers.json
    - github/pref_review__1203__bare_exception_rejected.json
  forbid_in_answer:
    - "I don't have information"
    - "no error handling conventions"

judge:
  pass_score: 75
  criteria:
    - name: cites_acmeerror_subclass_rule
      weight: 30
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer specifically require raising an `AcmeError`
        subclass (e.g. `OrderNotFoundError` from `acme.errors`) and
        explicitly say bare `Exception`/`HTTPException` is forbidden,
        attributing this to ADR-007 (rule ACME002)? A generic "raise a
        custom exception" without naming the AcmeError hierarchy fails.
    - name: cites_response_model_rule
      weight: 25
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer require the handler to declare `response_model=...`
        (ADR-007 / ACME001) and note that untyped `dict` returns are not
        allowed? Mentioning async-def discipline (ACME003) is a bonus but
        not required to pass.
    - name: connects_adr_to_review_enforcement
      weight: 25
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer ground the rule in BOTH the ADR-007 policy AND
        the lived enforcement (the PR #1203 review where the checkout
        lead rejected a bare `raise Exception` + untyped dict)? Citing
        only the ADR, or only the review, scores partial; connecting the
        two as "the policy and a real instance of it being enforced"
        scores full.
    - name: no_invented_rules
      weight: 20
      pass_threshold: 5
      dimensions: [PREF]
      prompt: |
        Does every cited rule map to ADR-007 or PR #1203? Valid
        identifiers: ADR-007, ACME001-ACME004, AcmeError, response_model,
        acme.errors, acme.web.errors, PR #1203, bench-user-1, checkout-api.
        Any other rule code, ADR number, error-class name, or invented
        constraint must fail this criterion.
