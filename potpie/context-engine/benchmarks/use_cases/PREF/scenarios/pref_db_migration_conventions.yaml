id: pref_db_migration_conventions
use_case: PREF
tier: extended
difficulty: medium
source_mix: dual
universe: acme

description: |
  An engineer is about to write their first database migration on
  inventory-svc (adding a column to the `reservations` table) and asks
  the agent what conventions and approvals apply. Two sources reinforce
  the same rules:

    - ADR-045 (`docs/adr/045-db-migrations-and-capacity.md`) — the
      canonical decision: schema changes ship as Alembic migrations under
      `migrations/<service>/versions/`, forward-only (no destructive
      prod downgrade), one logical change per migration; any PR touching
      `migrations/` (or changing per-worker connections/pool/worker
      count) requires DBA sign-off from bench-user-6 via CODEOWNERS;
      migrations must be backwards-compatible (safe while old code
      serves); renames use expand/contract across separate deploys; and a
      worker-fleet expansion >25% over baseline needs a pool-ceiling
      check signed off by the DBA.
    - A recent GitHub PR (#1225) that added `reservations.expires_at` to
      inventory-svc as an expand/contract migration: Alembic,
      forward-only, column added nullable (safe to deploy while old code
      serves), backfill + NOT-NULL switch as separate follow-up PRs, and
      explicit DBA approval from bench-user-6 (the +25% capacity rule
      didn't trigger because no worker-count change).

  Ground truth: write an Alembic forward-only migration under
  `migrations/inventory-svc/versions/`, one logical change; add the
  column nullable first (expand/contract — backfill and NOT-NULL come in
  later deploys); and get DBA sign-off from bench-user-6 because the PR
  touches `migrations/`. PR #1225 is the exact precedent.

  Why it's hard: the engine must surface a *process* requirement (DBA
  sign-off via CODEOWNERS) that the asking engineer didn't ask about,
  and prescribe the expand/contract pattern for a column-add rather than
  a naive single-step `ALTER`. It must also correctly note that the +25%
  capacity rule does NOT apply to a pure column-add (no worker/pool
  change) — so it shouldn't over-trigger that gate.

ingest:
  - { event: github/pref_pr__1225__inventory_migration_expand_contract.json, at: "-18d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-40d..-4d", count: 12 }
  - { event: noise/linear_issue_noise_template.json, at: "-42d..-6d", count: 6 }

post_ingest_assertions:
  # NOTE (read-layer gating): ADR-045 (Document/Decision) and the PR #1225
  # enforcement event are reconciled, but the topology read path surfaces
  # only Service/DataStore + DEPENDS_ON/USES — not Document/Decision/Person.
  # We anchor the structural floor on the inventory-svc Service and the
  # inventory-prod-db DataStore the migration targets, and grade the
  # migration-convention capability via retrieval + judge.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*inventory-svc", min_count: 1 }
    - { label: DataStore, key_pattern: "datastore:.*inventory-prod-db", min_count: 1 }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: feature
  scope: { service: inventory-svc }
  include: [coding_preferences, decisions, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [coding_preferences]
  source_refs_min: 2
  must_cite_event_id:
    - universe/acme/25-adr-045-db-migrations.json
    - github/pref_pr__1225__inventory_migration_expand_contract.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/linear_issue_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no migration conventions"

judge:
  pass_score: 65
  criteria:
    - name: alembic_forward_only
      weight: 20
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer require an Alembic migration under
        `migrations/inventory-svc/versions/`, forward-only, one logical
        change per migration (ADR-045 §1)? Generic "write a migration"
        without Alembic/forward-only scores partial.
    - name: dba_signoff_required
      weight: 30
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer flag — unprompted — that any PR touching
        `migrations/` requires DBA sign-off from bench-user-6 (via
        CODEOWNERS, ADR-045 §2)? This is the process requirement the
        engineer didn't ask about and the most important thing to
        surface; missing it must not pass this criterion.
    - name: expand_contract_pattern
      weight: 25
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer prescribe the backwards-compatible expand/contract
        pattern for a column-add — add the column nullable first (safe
        while old code serves), then backfill, then switch readers /
        NOT-NULL in separate deploys (ADR-045 §4/§5) — using PR #1225 as
        the worked precedent? A naive single-step `ALTER` answer fails.
    - name: capacity_rule_scope
      weight: 10
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer correctly scope the +25% fleet-capacity rule —
        either noting it does NOT trigger for a pure column-add (no
        worker/pool change), or only mentioning it as conditional on a
        worker/connection change? Asserting the +25% rule applies to this
        plain column-add (over-triggering) fails this criterion.
    - name: no_invented_rules
      weight: 15
      pass_threshold: 5
      dimensions: [PREF]
      prompt: |
        Does every cited rule map to ADR-045 or PR #1225? Valid
        identifiers: ADR-045, Alembic, forward-only, expand/contract,
        CODEOWNERS, +25% capacity rule, bench-user-6 (DBA), bench-user-2,
        inventory-svc, inventory-prod-db, reservations.expires_at, PR #1225.
        Any other reviewer, percentage, tool, or invented rule must fail.
