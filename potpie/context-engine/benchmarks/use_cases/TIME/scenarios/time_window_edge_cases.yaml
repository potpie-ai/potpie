id: time_window_edge_cases
use_case: TIME
tier: quick
difficulty: adversarial
source_mix: full
universe: acme

description: |
  An agent is asked: "what changed in checkout-api in the last 14 days?" — but
  this scenario is engineered to attack the window BOUNDARY itself.

  The 14-day window is exactly 336 hours. Two PRs sit ~1 hour on either side of
  that boundary, with deliberately similar bodies, so a naive recency filter
  that rounds days, uses a sloppy comparator, or includes the boundary
  exclusively/inclusively the wrong way will get exactly one of them wrong.

  Ground truth (relative to t=0 = now):
    INSIDE the window — must be INCLUDED:
      - PR #1230 (-335h, ~1h inside) clamp retry backoff on order submit.
      - CHK-420 (-13d) order-submit retry-cap tracking issue.
      - Deploy rev-e93f01 to checkout-api prod (-1d) shipping the fix.
    OUTSIDE the window — must be EXCLUDED:
      - PR #1228 (-337h, ~1h outside) rename internal order-state enum.

  The hard part is *single-event boundary precision*: PR #1230 (inside, -335h)
  and PR #1228 (outside, -337h) differ by only ~2 hours and both touch
  orders.py. A correct answer includes #1230 and the CHK-420 issue and the
  recent deploy, and explicitly does NOT surface PR #1228. Any answer that
  mentions PR #1228 fails the window criterion outright — that is the entire
  point of this adversarial scenario.

  (Offsets are single-unit, so the boundary is expressed in hours: 14d = 336h;
  -335h is ~1h inside, -337h is ~1h outside.)

ingest:
  - { event: github/pr_merged__1230__edge_just_inside.json, at: "-335h", tags: [signal] }
  - { event: linear/issue_create__CHK-420__edge_mid_window.json, at: "-13d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__prod__rev_edge.json, at: "-1d", tags: [signal] }
  - { event: github/pr_merged__1228__edge_just_outside.json, at: "-337h", tags: [distractor] }
  - { event: github/pr_merged__998__inventory_unrelated.json, at: "-79d", tags: [distractor] }

post_ingest_assertions:
  # NOTE (read-layer gating): PullRequest/Issue/Deployment nodes are reconciled
  # onto the timeline but the topology query/read path surfaces only topology
  # entities (Service/DataStore + DEPENDS_ON/USES). The boundary-precision
  # behaviour this scenario measures is graded via retrieval_assertions.temporal
  # + the judge. We anchor the structural floor on the checkout-api Service.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: review
  scope: { service: checkout-api, window_days: 14 }
  include: [timeline, infra_topology]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline]
  source_refs_min: 2
  must_cite_event_id:
    - github/pr_merged__1230__edge_just_inside.json
    - linear/issue_create__CHK-420__edge_mid_window.json
    - deploy/deploy_success__checkout_api__prod__rev_edge.json
  must_not_cite_event_id:
    - github/pr_merged__1228__edge_just_outside.json
    - github/pr_merged__998__inventory_unrelated.json
  temporal:
    must_order_correctly: true
    window: { from: "-14d", to: "0d" }
    out_of_window_refs_max: 0

judge:
  pass_score: 45
  criteria:
    - name: excludes_just_outside_event
      weight: 35
      pass_threshold: 5
      dimensions: [TIME]
      prompt: |
        Does the answer EXCLUDE PR #1228 (the internal order-state enum
        rename, merged ~1 hour OUTSIDE the 14-day window)? If PR #1228 is
        mentioned at all as a recent change, fail this criterion. This is the
        single most important check in this scenario.
    - name: includes_just_inside_event
      weight: 30
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer INCLUDE PR #1230 (clamp retry backoff, merged ~1 hour
        INSIDE the window)? Dropping it — being over-conservative at the
        boundary — also fails. The correct behaviour is to keep #1230 and drop
        #1228.
    - name: surfaces_other_in_window_events
      weight: 20
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer also surface the other in-window events — the CHK-420
        retry-cap issue (-13d) and the recent prod deploy rev-e93f01 (-1d)?
        Missing both fails; surfacing at least one in addition to PR #1230
        passes.
    - name: no_hallucination
      weight: 15
      pass_threshold: 5
      dimensions: [TIME]
      prompt: |
        Are all factual claims grounded? Valid identifiers: PR #1230, CHK-420,
        rev-e93f01, checkout-api, bench-user-1. PR #1228 and PR #998 exist in
        the data but are out of window/scope and must not be presented as
        in-window changes. Any other PR numbers, issue ids, revisions, or
        person names are hallucinations and fail.
