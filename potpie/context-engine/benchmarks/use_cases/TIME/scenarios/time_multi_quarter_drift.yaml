id: time_multi_quarter_drift
use_case: TIME
tier: quick
difficulty: medium
source_mix: dual
universe: acme

description: |
  An agent is asked: "How has auth-svc evolved over the last quarter?"

  This is a multi-quarter drift question. No single change tells the story —
  the engine must assemble five PRs and two issues spread across ~90 days into
  a coherent chronological narrative of how the service changed.

  Ground truth, in chronological order:
    1. PR #1012 (-88d, 2026-02-26) — shorten access-token expiry 60m->15m,
       add refresh-token rotation. (security)
    2. AUTH-77 filed (-81d, 2026-03-05) — RBAC redesign tracking issue.
    3. PR #1038 (-67d, 2026-03-19) — collapse 40 ad-hoc scopes into a 5-role
       RBAC model. Delivers AUTH-77. (refactor)
    4. PR #1071 (-46d, 2026-04-09) — cache JWKS + role lookups in
       redis(auth-cache), p99 verify 38ms->4ms. (performance)
    5. AUTH-91 filed (-33d, 2026-04-22) — credential-stuffing on /login.
    6. PR #1099 (-25d, 2026-04-30) — per-IP rate limit on /login + /token,
       backed by the redis cache from #1071. Delivers AUTH-91. (security)
    7. PR #1149 (-6d, 2026-05-19) — bump PyJWT 2.8->2.9 (CVE patch). (chore)

  The hard part is *cumulative chronology over a long span*: the engine must
  order seven events correctly across 90 days, and ideally notice the arc —
  auth-svc tightened token policy, then restructured authorization (RBAC),
  then made it fast (redis cache), then hardened it (rate limit), with a
  routine security bump at the end. PR #1099 building on the redis cache from
  PR #1071 is a causal thread a strong answer surfaces. Window is the full
  quarter (-90d to 0d) so nothing is excluded; ORDER and NARRATIVE are graded.

ingest:
  - { event: github/pr_merged__1012__auth_jwt_expiry.json, at: "-88d", tags: [signal] }
  - { event: linear/issue_create__AUTH-77__rbac_redesign.json, at: "-81d", tags: [signal] }
  - { event: github/pr_merged__1038__auth_scope_refactor.json, at: "-67d", tags: [signal] }
  - { event: github/pr_merged__1071__auth_redis_cache.json, at: "-46d", tags: [signal] }
  - { event: linear/issue_create__AUTH-91__credential_stuffing.json, at: "-33d", tags: [signal] }
  - { event: github/pr_merged__1099__auth_rate_limit.json, at: "-25d", tags: [signal] }
  - { event: github/pr_merged__1149__auth_pyjwt_bump.json, at: "-6d", tags: [signal] }

distractor_events:
  - { event: "noise/github_chore_noise_template.json", at: "-80d..-10d", count: 8, shape: "noise/random" }

post_ingest_assertions:
  # NOTE (read-layer gating): PullRequest/Issue/Person nodes are reconciled
  # onto the timeline but the topology query/read path surfaces only topology
  # entities (Service/DataStore + DEPENDS_ON/USES). The quarter-long drift
  # narrative this scenario measures is graded via retrieval + the judge. We
  # anchor the structural floor on the auth-svc Service all PRs touch.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*auth-svc", min_count: 1 }
  graph_must_not_contain:
    - { label: PullRequest, key_pattern: ".*:400[0-9]", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: review
  scope: { service: auth-svc, window_days: 90 }
  include: [timeline, infra_topology]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline]
  source_refs_min: 4
  must_cite_event_id:
    - github/pr_merged__1012__auth_jwt_expiry.json
    - github/pr_merged__1038__auth_scope_refactor.json
    - github/pr_merged__1071__auth_redis_cache.json
    - github/pr_merged__1099__auth_rate_limit.json
    - github/pr_merged__1149__auth_pyjwt_bump.json
  must_not_cite_event_id:
    - github/pr_merged__998__inventory_unrelated.json
  temporal:
    must_order_correctly: true
    window: { from: "-90d", to: "0d" }
    out_of_window_refs_max: 0

judge:
  pass_score: 65
  criteria:
    - name: chronological_narrative
      weight: 35
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer present a chronological narrative of how auth-svc
        evolved over the quarter, with the PRs in correct merge order:
        #1012 (token expiry) -> #1038 (RBAC) -> #1071 (redis cache) -> #1099
        (rate limit) -> #1149 (PyJWT bump)? Out-of-order listing, or a flat
        unordered dump, fails this criterion.
    - name: names_changes_in_order
      weight: 25
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer name the individual PRs (by number or by what they
        did) and roughly when each landed? Naming at least four of the five
        PRs with approximate timing passes; vague "lots of auth work
        happened" does not.
    - name: surfaces_evolution_arc
      weight: 25
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer convey the ARC of the change rather than a bare list
        — e.g. that auth-svc tightened token policy, restructured
        authorization into roles, sped verification up with a redis cache,
        then hardened login against credential stuffing? Bonus credit for
        noticing the rate-limit PR (#1099) reused the redis cache from #1071.
    - name: no_hallucination
      weight: 15
      pass_threshold: 5
      dimensions: [TIME]
      prompt: |
        Are all factual claims grounded? Valid identifiers: auth-svc, PR
        #1012, #1038, #1071, #1099, #1149, AUTH-77, AUTH-91, redis(auth-cache),
        bench-user-14. Any other PR numbers (e.g. the chore noise PRs in the
        4000 range), issue ids, or person names are hallucinations and fail.
