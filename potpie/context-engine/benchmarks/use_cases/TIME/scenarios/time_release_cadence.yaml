id: time_release_cadence
use_case: TIME
tier: extended
difficulty: medium
source_mix: single
universe: acme

description: |
  An operator asks: "How often do we ship checkout-api, and what's the latest
  prod release?"

  This is a release-cadence question over deploy events only. The engine must
  summarise deployment frequency over the last 60 days and pinpoint the most
  recent prod deploy with its revision.

  Ground truth — eight successful deploys over ~60 days (staging + prod):
    1. -58d staging rev a10001
    2. -56d prod    rev a10001
    3. -45d staging rev b20002
    4. -42d prod    rev b20002
    5. -31d staging rev c30003
    6. -28d prod    rev c30003
    7. -14d prod    rev d40004
    8. -2d  prod    rev e50005   <-- MOST RECENT PROD DEPLOY

  Cadence reads as roughly a release train every ~2 weeks: three staging->prod
  promotion pairs early in the window (revs a10001, b20002, c30003), then two
  prod hotfix/release deploys (d40004 at -14d, e50005 at -2d). Five prod
  deploys total over 60 days ~= one every ~12 days; eight deploys counting
  staging.

  The hard part is *summarising frequency without inventing deploys*: the
  engine must derive an approximate cadence (roughly biweekly), correctly name
  the latest prod deploy (rev e50005, -2d), and NOT fabricate deploys that
  aren't in the data or miscount staging as prod.

ingest:
  - { event: deploy/deploy_success__checkout_api__staging__cadence_a10001.json, at: "-58d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__prod__cadence_a10001p.json, at: "-56d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__staging__cadence_b20002.json, at: "-45d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__prod__cadence_b20002p.json, at: "-42d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__staging__cadence_c30003.json, at: "-31d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__prod__cadence_c30003p.json, at: "-28d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__prod__cadence_d40004p.json, at: "-14d", tags: [signal] }
  - { event: deploy/deploy_success__checkout_api__prod__cadence_e50005p.json, at: "-2d", tags: [signal] }

post_ingest_assertions:
  # NOTE (read-layer gating): Deployment/Activity nodes are reconciled onto the
  # timeline but the topology query/read path surfaces only topology entities
  # (Service/DataStore + DEPENDS_ON/USES). The cadence summary this scenario
  # measures is graded via retrieval + the judge. We anchor the structural
  # floor on the checkout-api Service all deploys target.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: operations
  scope: { service: checkout-api, window_days: 60 }
  include: [timeline, infra_topology]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline]
  source_refs_min: 4
  must_cite_event_id:
    - deploy/deploy_success__checkout_api__prod__cadence_e50005p.json
    - deploy/deploy_success__checkout_api__prod__cadence_d40004p.json
    - deploy/deploy_success__checkout_api__prod__cadence_c30003p.json
  must_not_cite_event_id:
    - github/pr_merged__998__inventory_unrelated.json
  temporal:
    must_order_correctly: true
    window: { from: "-60d", to: "0d" }
    out_of_window_refs_max: 0

judge:
  pass_score: 65
  criteria:
    - name: summarises_cadence
      weight: 35
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer characterise the deployment cadence over the ~60-day
        window — e.g. "roughly a release every ~2 weeks", or "about
        five prod deploys over two months"? A bare list with no sense of
        frequency does not pass; an explicit rate or rhythm does.
    - name: names_latest_prod_deploy
      weight: 30
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer correctly identify the MOST RECENT prod deploy as
        rev e50005 (~2 days ago)? Naming a staging deploy, an older prod
        deploy, or the wrong revision fails this criterion.
    - name: prod_vs_staging_distinction
      weight: 20
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer keep prod and staging deploys distinct rather than
        lumping all eight together as prod releases? Recognising that the
        early window was staging->prod promotion pairs, or simply that some
        deploys were staging, passes.
    - name: no_hallucination
      weight: 15
      pass_threshold: 5
      dimensions: [TIME]
      prompt: |
        Are all factual claims grounded? Valid revisions: a10001, b20002,
        c30003, d40004, e50005, all on checkout-api, deployed by bench-user-1.
        Any invented revision, deploy date, or deploy count that isn't
        supported by the eight events is a hallucination and fails.
