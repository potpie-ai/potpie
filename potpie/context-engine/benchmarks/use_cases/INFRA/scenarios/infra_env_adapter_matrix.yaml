id: infra_env_adapter_matrix
use_case: INFRA
tier: quick
difficulty: medium
source_mix: dual
universe: acme

description: |
  An engineer is wiring a new backend for an Acme service and asks how the
  three environments differ — specifically which concrete adapter each
  service binds to in dev vs staging vs prod, and how a new adapter is
  added without an `if env ==` branch. The agent must reconstruct the
  environment adapter matrix and the bootstrap-binding rule.

  Ground-truth (from `universe/acme/11-environments-secrets.json` plus the
  notion env-adapter page):
    - Object storage: dev LocalFS → staging MinIO → prod AWS S3.
    - Email/SMS: dev console-logger (no send) → staging SendGrid sandbox +
      Twilio test → prod SendGrid prod + Twilio prod.
    - Payments: dev Stripe test → staging Stripe test → prod Stripe LIVE
      (`sk_live_*`).
    - Cache: dev local Redis → staging/prod ElastiCache (prod multi-AZ).
    - THE rule: code MUST NOT branch on `ENV`. Concrete adapters are chosen
      once at bootstrap by the `AdapterRegistry`; handlers depend on the
      port, never the concrete class. The dual signal is a github PR
      (#1188) that adds a new AzureBlobStorageAdapter the RIGHT way — by
      registering it in the AdapterRegistry, explicitly NOT by adding an
      environment branch.

  Why it's hard: the environment difference is *entirely in adapter
  binding*, not in branching logic, and the per-concern matrix is easy to
  collapse into a vague "prod uses real services, dev uses fakes". The
  agent must keep per-concern, per-env distinctions (especially Stripe
  live-only-in-prod) and articulate the no-ENV-branching rule that the PR
  demonstrates.

  NOTE (read-layer gating): the live snapshot read surfaces only topology
  entities (Service / DataStore + DEPENDS_ON / USES). The env adapter
  matrix and the no-branching rule are NOT structurally returned, so they
  are graded in the synthesis judge. We anchor the structural floor on the
  canonical Service set (which the topology read does surface) and forbid
  any Service entity manufactured out of the environment names.

ingest:
  - { event: notion/env_adapter_matrix_runbook.json, at: "-17d", tags: [signal] }
  - { event: github/pr_merged__1188__azure_blob_adapter.json, at: "-13d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-40d..-3d", count: 12 }
  - { event: noise/slack_chatter_noise_template.json, at: "-30d..-2d", count: 8 }

post_ingest_assertions:
  graph_must_contain_entities:
    - { label: Service, min_count: 7 }
    - { label: Service, key_pattern: "service:.*payments-svc", min_count: 1 }
  graph_must_not_contain:
    - { label: Service, key_pattern: "(?i)(localfs|minio|stripe|sendgrid|twilio|elasticache|adapterregistry)", max_count: 0 }
    - { label: Service, key_pattern: "type:chore", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: onboarding
  scope: { topic: environments }
  include: [infra_topology, owners, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [infra_topology]
  source_refs_min: 2
  must_cite_event_id:
    - universe/acme/11-environments-secrets.json
    - notion/env_adapter_matrix_runbook.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/slack_chatter_noise_template.json

judge:
  pass_score: 65
  criteria:
    - name: object_storage_matrix
      weight: 22
      pass_threshold: 3
      dimensions: [INFRA]
      prompt: |
        Does the answer correctly distinguish object storage per
        environment — dev LocalFS, staging MinIO, prod AWS S3? Collapsing
        these (e.g. "S3 everywhere", or "dev/staging the same") fails this.
    - name: payments_stripe_mode
      weight: 22
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer state that prod uses Stripe LIVE mode (`sk_live_*`)
        while BOTH staging and dev use Stripe TEST mode (`sk_test_*`)?
        Claiming staging uses a live key, or that all three differ, fails.
    - name: no_env_branching_rule
      weight: 26
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer articulate the core rule — code MUST NOT branch on
        `ENV`; concrete adapters are selected once at bootstrap via the
        `AdapterRegistry`; handlers depend on the port, not the concrete
        adapter — and ideally cite PR #1188 as adding a new adapter the
        right way (registry registration, NOT an `if env ==` branch)?
        An answer that implies environments differ via in-handler
        conditionals fails this.
    - name: email_and_cache_matrix
      weight: 14
      pass_threshold: 3
      dimensions: [INFRA]
      prompt: |
        Does the answer get email/SMS (dev console-logger no-send →
        staging SendGrid sandbox/Twilio test → prod SendGrid/Twilio prod)
        and cache (dev local Redis → staging/prod ElastiCache, prod
        multi-AZ) roughly right per environment?
    - name: no_invented_services
      weight: 16
      pass_threshold: 5
      dimensions: [INFRA]
      prompt: |
        Are all services named drawn from the canonical Acme service list
        (checkout-api, inventory-svc, payments-svc, notifications-svc,
        auth-svc, web-app, analytics-pipeline)? Treating an adapter or a
        third-party (LocalFS, MinIO, S3, Stripe, SendGrid, Twilio,
        ElastiCache, AdapterRegistry) as if it were one of Acme's own
        services fails this criterion.
