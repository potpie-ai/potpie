id: infra_kafka_topology
use_case: INFRA
tier: extended
difficulty: medium
source_mix: single
universe: acme

description: |
  An engineer asks who produces and who consumes the orders-topic Kafka
  topic. The agent must reconstruct the orders-topic fan-out and the
  smaller notifications-topic flow from the architecture seed and the
  dedicated kafka-topology doc.

  Ground-truth (from `universe/acme/00-architecture.json` plus
  `repo_docs/infra_kafka_topology.json`):
    - orders-topic — sole PRODUCER is checkout-api (`OrderPlaced`).
      CONSUMERS (fan-out, three, each in its own consumer group):
      inventory-svc, notifications-svc, analytics-pipeline.
    - notifications-topic — PRODUCER is notifications-svc
      (`NotificationSent`); CONSUMER is analytics-pipeline.
    - payments-svc, auth-svc and web-app touch NEITHER topic (payments is
      a synchronous call from checkout-api; auth/web are off the bus).
    - There are exactly two business topics; do not invent others.

  Why it's hard: it's tempting to assume every service is on the bus, or to
  swap a producer for a consumer. The agent must keep the direction right
  (checkout-api produces, the other three consume) and resist inventing a
  topic per service or putting payments-svc on Kafka.

  NOTE (read-layer gating): the live snapshot read surfaces only topology
  entities (Service / DataStore + DEPENDS_ON / USES). Kafka topics surface
  as DataStore-class infra rather than Service; the producer/consumer
  direction is graded in the synthesis judge. We anchor the structural
  floor on the canonical Service set and forbid Service nodes minted from
  topic names.

ingest:
  - { event: repo_docs/infra_kafka_topology.json, at: "-15d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-40d..-3d", count: 12 }
  - { event: noise/linear_issue_noise_template.json, at: "-35d..-2d", count: 8 }

post_ingest_assertions:
  graph_must_contain_entities:
    - { label: Service, min_count: 7 }
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
    - { label: Service, key_pattern: "service:.*analytics-pipeline", min_count: 1 }
  graph_must_not_contain:
    - { label: Service, key_pattern: "(?i)(orders-topic|notifications-topic|orderplaced|notificationsent)", max_count: 0 }
    - { label: Service, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: operations
  scope: { topic: kafka }
  include: [infra_topology, owners, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [infra_topology]
  source_refs_min: 1
  must_cite_event_id:
    - universe/acme/00-architecture.json
    - repo_docs/infra_kafka_topology.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/linear_issue_noise_template.json

judge:
  pass_score: 65
  criteria:
    - name: orders_topic_producer
      weight: 22
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer name checkout-api as the SOLE producer of
        orders-topic? Naming any other service as a producer, or omitting
        the producer, fails this.
    - name: orders_topic_consumers
      weight: 30
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer name all three orders-topic consumers —
        inventory-svc, notifications-svc, analytics-pipeline (each in its
        own consumer group)? Missing one, or including a service that does
        not consume it (e.g. payments-svc, auth-svc), reduces the score.
    - name: notifications_topic_flow
      weight: 24
      pass_threshold: 3
      dimensions: [INFRA]
      prompt: |
        Does the answer cover notifications-topic — produced by
        notifications-svc (`NotificationSent`), consumed by
        analytics-pipeline? Swapping producer/consumer fails this.
    - name: no_invented_topics
      weight: 12
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer stick to the two real topics (orders-topic,
        notifications-topic) and keep payments-svc / auth-svc / web-app OFF
        the bus? Inventing a per-service topic, or putting payments-svc on
        Kafka, fails this.
    - name: no_invented_services
      weight: 12
      pass_threshold: 5
      dimensions: [INFRA]
      prompt: |
        Are all services named drawn from the canonical Acme service list
        (checkout-api, inventory-svc, payments-svc, notifications-svc,
        auth-svc, web-app, analytics-pipeline)? Treating a topic name or an
        event type as a service fails this criterion.
