id: bug_celery_worker_starvation
use_case: BUG
tier: quick
difficulty: adversarial
source_mix: adversarial
universe: acme

description: |
  ADVERSARIAL case-retrieval. notifications-svc transactional emails
  (confirmations, password resets) are badly delayed; the Celery `default`
  queue is at ~9.4k and climbing and workers are 100% busy. A new heavy
  `generate_weekly_sales_report_pdf` task shipped this week. The engineer
  files OPS-455 and asks if there's history.

  The trap: TWO prior incidents look superficially similar.
    - OPS-330 (the REAL prior): the `default` Celery queue was starved
      because a long PDF task shared it with fast transactional tasks —
      head-of-line blocking. Tell: queue DEEP + workers BUSY. Fixed in
      PR #948 by routing heavy tasks to a dedicated `heavy` queue. THIS is
      today's match (today also has a deep queue, busy workers, and a new
      heavy PDF task).
    - OPS-340 (the NEAR-MISS, must NOT be selected): notifications "emails
      delayed" too, same service, but root cause was Kafka consumer lag —
      tasks were never enqueued. Tell: queue EMPTY + workers IDLE. Different
      layer, different fix (PR #976 consumer tuning).

  A strong answer must select OPS-330 as the prior, justify it via the
  discriminator (deep queue + busy workers = starvation, not idle/Kafka-lag),
  surface PR #948's dedicated `heavy` queue, recommend routing the new
  weekly-report PDF to `heavy`, and NOT misattribute the cause to the
  OPS-340 Kafka-lag story.

  Adversarial tier: two near-miss priors that match on service + surface
  symptom; only one is the correct root-cause class. The bench checks the
  engine retrieves the right one and does NOT cite the contradicting one.

ingest:
  - { event: linear/bug_celery_real_prior.json, at: "-92d", tags: [signal] }
  - { event: github/bug_celery_real_fix.json, at: "-90d", tags: [signal] }
  - { event: linear/bug_celery_nearmiss.json, at: "-76d", tags: [signal] }
  - { event: alerting/bug_celery_today_alert.json, at: "0d", tags: [signal] }
  - { event: slack/bug_celery_thread.json, at: "0d", tags: [signal] }
  - { event: linear/bug_celery_today.json, at: "0d", tags: [signal] }

distractor_events:
  - { event: noise/linear_issue_noise_template.json, at: "-80d..-2d", count: 12 }
  - { event: noise/alerting_noise_template.json, at: "-60d..-1d", count: 8 }

post_ingest_assertions:
  # NOTE (read-layer gating): Issue/PR/Alert nodes are reconciled but the
  # topology read surfaces only Service/DataStore. The (hard) discrimination
  # between OPS-330 and OPS-340 is graded in retrieval + the judge. Anchor on
  # notifications-svc.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*notifications-svc", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: notifications-svc }
  include: [prior_bugs, infra_topology, timeline]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [prior_bugs]
  source_refs_min: 2
  must_cite_event_id:
    - linear/bug_celery_real_prior.json
    - github/bug_celery_real_fix.json
  must_not_cite_event_id:
    - linear/bug_celery_nearmiss.json
  forbid_in_answer:
    - "I don't have information"

judge:
  pass_score: 45
  criteria:
    - name: selects_correct_prior
      weight: 30
      pass_threshold: 4
      prompt: |
        Does the answer identify OPS-330 (Celery default-queue starvation by
        a long PDF task, fixed in PR #948 with a dedicated `heavy` queue) as
        the matching prior incident?
    - name: rejects_near_miss
      weight: 25
      pass_threshold: 4
      prompt: |
        Does the answer AVOID misattributing today's incident to OPS-340
        (the Kafka consumer-lag near-miss)? Treating today's deep-queue /
        busy-worker starvation as a Kafka-lag problem, or citing OPS-340 as
        the prior, fails this criterion. Bonus if it explicitly distinguishes
        them via the discriminator (deep queue + busy workers vs empty queue
        + idle workers).
    - name: actionable_first_steps
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer recommend routing the new generate_weekly_sales_report_pdf
        task to the `heavy` Celery queue (per PR #948's rule that >10s p95
        tasks must not share the `default` queue with transactional tasks)?
    - name: no_hallucination
      weight: 20
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid references: OPS-330, OPS-340, OPS-455,
        PR #948, PR #976, Celery, default queue, heavy queue,
        generate_weekly_sales_report_pdf, notifications-svc, orders-topic,
        bench-user-13, bench-user-16. Other PRs/services/people are
        hallucinations.
