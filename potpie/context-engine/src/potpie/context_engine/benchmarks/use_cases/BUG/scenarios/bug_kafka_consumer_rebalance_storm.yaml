id: bug_kafka_consumer_rebalance_storm
use_case: BUG
tier: extended
difficulty: hard
source_mix: full
universe: acme

description: |
  notifications-svc consumer lag on orders-topic is exploding (1.8M and
  rising) with >40 rebalances in 10 minutes — partitions revoked/reassigned
  in a loop, emails basically stopped. It started ~30 min after a 14:00
  deploy. A new engineer files the incident in #incidents.

  Ground truth: this is a rebalance storm, the same root-cause class as
  OPS-365 (analytics-pipeline). The deploy lowered `max.poll.interval.ms`
  300s→60s AND made per-message processing slower (inline image rendering),
  so the consumer occasionally misses the poll deadline, the broker considers
  it dead, kicks it from the group, triggers a rebalance — which pauses
  everyone and makes the next batch slower, triggering another rebalance: a
  self-reinforcing loop. OPS-365's fix (PR #985) raised max.poll.interval.ms
  to comfortably exceed worst-case batch time and lowered max.poll.records,
  and moved heavy work off the poll loop. Rule: batch processing time must
  stay well under max.poll.interval.ms; never lower the interval without
  checking batch duration.

  A strong answer recognises the rebalance storm, surfaces OPS-365 + PR #985,
  ties today's storm to the deploy that lowered the poll interval while
  slowing batches, and recommends raising max.poll.interval.ms / lowering
  max.poll.records / moving rendering off the poll loop.

  Hard tier: deploy + alerting + linear + slack, with a deploy-correlated
  trigger and distractors.

ingest:
  - { event: linear/bug_rebalance_prior.json, at: "-65d", tags: [signal] }
  - { event: deploy/bug_rebalance_deploy.json, at: "0d", tags: [signal] }
  - { event: alerting/bug_rebalance_alert.json, at: "0d", tags: [signal] }
  - { event: slack/bug_rebalance_thread.json, at: "0d", tags: [signal] }

distractor_events:
  - { event: noise/alerting_noise_template.json, at: "-50d..-1d", count: 12 }
  - { event: noise/linear_issue_noise_template.json, at: "-60d..-2d", count: 10 }

post_ingest_assertions:
  # NOTE (read-layer gating): Issue/Deployment/Alert nodes are reconciled but
  # the topology read surfaces only Service/DataStore. Case retrieval graded
  # in retrieval + judge. Anchor on notifications-svc (+ orders-topic is a
  # dependency, not always surfaced as a node).
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*notifications-svc", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: notifications-svc }
  include: [prior_bugs, infra_topology, timeline]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [prior_bugs]
  source_refs_min: 2
  must_cite_event_id:
    - linear/bug_rebalance_prior.json
    - deploy/bug_rebalance_deploy.json
  must_not_cite_event_id:
    - noise/linear_issue_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no prior incidents"

judge:
  pass_score: 55
  criteria:
    - name: surfaces_prior_incident
      weight: 25
      pass_threshold: 4
      prompt: |
        Does the answer reference OPS-365 (the prior analytics-pipeline
        rebalance storm) by identifier and surface PR #985's fix (raise
        max.poll.interval.ms, lower max.poll.records, move heavy work off the
        poll loop)?
    - name: identifies_recurrence_pattern
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer diagnose the continuous revoke/assign as a rebalance
        storm caused by batch processing exceeding max.poll.interval.ms, and
        connect it to the OPS-365 root-cause class?
    - name: links_to_change
      weight: 20
      pass_threshold: 3
      prompt: |
        Does the answer tie today's storm to the 14:00 deploy that lowered
        max.poll.interval.ms 300s→60s while making per-message processing
        slower (inline image rendering)?
    - name: actionable_first_steps
      weight: 15
      pass_threshold: 3
      prompt: |
        Does the answer recommend raising max.poll.interval.ms back / lowering
        max.poll.records / moving rendering off the poll loop (per PR #985)?
    - name: no_hallucination
      weight: 15
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid references: OPS-365, PR #985,
        max.poll.interval.ms, max.poll.records, orders-topic, notifications-svc,
        analytics-pipeline, bench-user-11, bench-user-13, bench-user-16.
        Other PRs/services/people are hallucinations.
