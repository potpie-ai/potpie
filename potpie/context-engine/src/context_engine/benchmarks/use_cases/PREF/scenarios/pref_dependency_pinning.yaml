id: pref_dependency_pinning
use_case: PREF
tier: extended
difficulty: hard
source_mix: dual
universe: acme

description: |
  An engineer is adding a new third-party library to payments-svc and
  asks the agent how this team declares and maintains dependencies. Two
  sources reinforce the same policy:

    - A Notion "Dependency Pinning & Update Policy" page (scenario-local)
      — the canonical policy: pin exact versions in the lockfile (what
      runs in prod is byte-for-byte what CI tested); NO floating ranges
      (`*`, `^`, `~`, `>=`) for production deps in the manifest; Renovate
      runs weekly (Mondays) to open grouped, reviewable update PRs —
      humans do not hand-bump; security patches merge within a 7-day SLA
      of the advisory; the lockfile is the single source of truth and is
      never hand-edited.
    - A recent GitHub PR (#1232) that brought payments-svc into line by
      replacing a floating `httpx = "^0.27"` with an exact
      `httpx = "0.27.2"` and re-resolving `poetry.lock`, citing the
      policy and the lint rule that fails prod deps using non-exact
      ranges.

  Ground truth: declare the new dependency with an exact `==` pin (no
  `*`/`^`/`~`/`>=` for a prod dep) and commit the re-resolved lockfile;
  let weekly Renovate propose future bumps as reviewable PRs rather than
  hand-bumping; and know the 7-day security-patch SLA for CVE-affected
  deps. PR #1232 is the worked precedent for replacing a floating range.

  Why it's hard: (1) heavy distractor noise (~25:1) of unrelated chore
  PRs (some of which are themselves dependency *bumps*) means the engine
  must isolate the policy + the one on-point PR from look-alike noise;
  (2) the question ("how do I add a dep") is phrased neutrally, so the
  engine must surface the prohibition on floating ranges unprompted; and
  (3) it must not invent a different SLA, cadence, or pinning mechanism
  than the policy states.

ingest:
  - { event: github/pref_pr__1232__pin_floating_dependency.json, at: "-14d", tags: [signal] }
  - { event: notion/pref_dependency_pinning_policy.json, at: "-40d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-45d..-2d", count: 60 }
  - { event: noise/linear_issue_noise_template.json, at: "-45d..-2d", count: 25 }
  - { event: noise/slack_chatter_noise_template.json, at: "-45d..-2d", count: 15 }

post_ingest_assertions:
  # NOTE (read-layer gating): the scenario-local Notion pinning policy
  # (Document/Decision) and the PR #1232 enforcement event are reconciled,
  # but the topology read path surfaces only Service/DataStore +
  # DEPENDS_ON/USES — not Document/Decision/Person nodes. We anchor the
  # structural floor on the payments-svc Service whose deps are at issue
  # and grade the policy capability via retrieval + judge.
  # graph_must_not_contain holds the precision line against the heavy
  # distractor noise (including look-alike chore/dependency-bump PRs).
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*payments-svc", min_count: 1 }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: planning
  scope: { service: payments-svc }
  include: [coding_preferences, decisions, docs]
  mode: deep
  source_policy: summary

retrieval_assertions:
  required_includes_used: [coding_preferences]
  source_refs_min: 2
  must_cite_event_id:
    - notion/pref_dependency_pinning_policy.json
    - github/pref_pr__1232__pin_floating_dependency.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/linear_issue_noise_template.json
    - noise/slack_chatter_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no dependency policy"

judge:
  pass_score: 55
  criteria:
    - name: exact_pin_no_floating
      weight: 30
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer require an exact version pin for the new prod
        dependency and explicitly forbid floating ranges (`*`, `^`, `~`,
        `>=`) in the manifest, with the lockfile committed/re-resolved as
        the source of truth? A generic "add the dependency" without the
        no-floating-range rule fails.
    - name: renovate_weekly_cadence
      weight: 20
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer state that updates come through Renovate on a
        weekly cadence as reviewable PRs, rather than humans hand-bumping
        versions ad hoc? The weekly Renovate mechanism must be named.
    - name: security_patch_sla
      weight: 20
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer state the security-patch SLA — a CVE-affected
        dependency must be patched (or mitigated) within 7 days of the
        advisory? The 7-day figure must be correct; a different SLA fails.
    - name: uses_pr_precedent
      weight: 10
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer reference PR #1232 (replacing floating
        `httpx ^0.27` with exact `0.27.2` and re-resolving the lockfile)
        as the worked precedent, rather than only quoting the policy?
    - name: no_invented_rules
      weight: 20
      pass_threshold: 5
      dimensions: [PREF]
      prompt: |
        Does the answer avoid inventing policy details? Valid identifiers:
        exact pin / `==`, no `*`/`^`/`~`/`>=` in prod deps, lockfile
        (poetry.lock), Renovate weekly (Mondays), 7-day security SLA,
        payments-svc, httpx, PR #1232, bench-user-3, bench-user-4,
        bench-user-5. Any other SLA period, update cadence, tool, or
        invented rule (and pulling in the distractor chore/bump PRs as if
        relevant) must fail this criterion.
