id: pref_pydantic_over_dataclass
use_case: PREF
tier: quick
difficulty: medium
source_mix: dual
universe: acme

description: |
  An engineer is modelling a new DTO that crosses the checkout-api ↔
  payments-svc boundary and asks the agent whether to use a
  `@dataclass`, `attrs`, or Pydantic. The team has an explicit, recent
  answer and a worked example:

    - ADR-014 (`docs/adr/014-pydantic-over-dataclasses.md`) — the
      canonical decision: all new DTOs and FastAPI request/response
      models MUST use Pydantic v2 `BaseModel`; bare `@dataclass` is
      allowed only for internal-state structs that never cross a process
      boundary; `attrs` is forbidden in new code.
    - A recent GitHub PR (#1211) that migrated `CheckoutSessionDTO` —
      a boundary type — from `@dataclass` to a Pydantic v2 `BaseModel`,
      replacing hand-rolled `__post_init__` validation with
      `Field(gt=0)` / `Field(pattern=...)` constraints and switching
      `to_dict()` to `model_dump()`. The PR is the exact pattern the
      asking engineer should follow.

  Ground truth: use Pydantic v2 `BaseModel` for the new DTO because it
  crosses a service boundary; express validation with `Field(...)`
  constraints (the automatic 422 contract), not `__post_init__`; reserve
  `@dataclass` for internal structs only; never reach for `attrs`.

  Why it's hard: the scenario runs against ~10:1 distractor noise
  (chore PRs, unrelated tickets) so the engine must pull the two
  relevant signals (ADR-014 + PR #1211) out of a noisy timeline and
  recognise the PR as a concrete application of the ADR rather than an
  unrelated refactor. The answer must distinguish the boundary-type rule
  ("use Pydantic") from the permitted exception ("dataclass OK for
  internal-only structs").

ingest:
  - { event: github/pref_pr__1211__dataclass_to_pydantic.json, at: "-19d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-40d..-3d", count: 14 }
  - { event: noise/linear_issue_noise_template.json, at: "-45d..-5d", count: 6 }

post_ingest_assertions:
  # NOTE (read-layer gating): ADR-014 (Document/Decision) and the PR #1211
  # enforcement event are reconciled, but the topology read path surfaces
  # only Service/DataStore + DEPENDS_ON/USES — not Document/Decision/Person.
  # So we anchor the structural floor on the checkout-api Service the new
  # DTO belongs to, and grade the actual PREF capability via retrieval +
  # judge. graph_must_not_contain holds the precision line against the
  # chore-PR / footer-ticket distractor noise.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: feature
  scope: { service: checkout-api }
  include: [coding_preferences, decisions, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [coding_preferences]
  source_refs_min: 2
  must_cite_event_id:
    - universe/acme/20-adr-014-pydantic.json
    - github/pref_pr__1211__dataclass_to_pydantic.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/linear_issue_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no DTO conventions"

judge:
  pass_score: 65
  criteria:
    - name: requires_pydantic_v2_for_boundary_dto
      weight: 30
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer require modelling the new boundary DTO with a
        Pydantic v2 `BaseModel`, citing ADR-014? "Use a schema library"
        or "use Pydantic" without specifying v2 `BaseModel` for this
        boundary type scores partial.
    - name: states_dataclass_exception
      weight: 20
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer correctly state the exception — `@dataclass` is
        permitted only for internal-state structs that never cross a
        process boundary, and `attrs` is forbidden in new code? An answer
        that says "never use dataclass" (overstating the rule) or omits
        the exception entirely fails.
    - name: uses_pr_as_worked_example
      weight: 25
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer reference PR #1211 (the CheckoutSessionDTO
        migration) as the concrete pattern to follow — e.g. expressing
        validation via `Field(...)` constraints for the automatic 422
        contract instead of `__post_init__`, and using `model_dump()`?
        Citing the ADR alone without the worked example scores partial.
    - name: ignores_distractors
      weight: 10
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer stay clean of the distractor noise (chore/tooling
        PRs, footer-copy tickets)? Any claim that pulls in unrelated
        chore PRs or NOISE-* tickets as if relevant fails this criterion.
    - name: no_invented_rules
      weight: 15
      pass_threshold: 5
      dimensions: [PREF]
      prompt: |
        Does every cited rule map to ADR-014 or PR #1211? Valid
        identifiers: ADR-014, Pydantic v2, BaseModel, Field, model_dump,
        CheckoutSessionDTO, PR #1211, checkout-api, payments-svc,
        bench-user-1, bench-user-3. Any other ADR number, library, or
        invented constraint must fail this criterion.
