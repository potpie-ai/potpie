id: infra_oncall_topology
use_case: INFRA
tier: quick
difficulty: hard
source_mix: full
universe: acme

description: |
  A new SRE asks "who owns each service and who do I page when it breaks?"
  The agent must reconstruct the full owner-per-service map plus the SRE
  on-call rotation and the DBA escalation, from the team roster, a notion
  on-call page, and a slack handoff thread.

  Ground-truth (from `universe/acme/10-team.json`, the notion on-call page,
  and the slack handoff):
    - Owners (team / lead): checkout-api @platform-checkout / bench-user-1;
      inventory-svc @platform-data / bench-user-2; payments-svc
      @platform-payments / bench-user-3; notifications-svc
      @platform-platform / bench-user-13; auth-svc @platform-platform /
      bench-user-14; web-app @web / bench-user-7; analytics-pipeline
      @data-platform / bench-user-11.
    - SRE primary on-call alternates weekly: bench-user-4 on ODD ISO weeks,
      bench-user-5 on EVEN ISO weeks. Service leads are secondary
      escalation for their own service.
    - DBA: bench-user-6 — required reviewer / escalation for any schema
      migration or pool-ceiling change on the four Postgres datastores;
      looped in after the SRE primary for DB incidents.

  Why it's hard: three sources must be reconciled into one consistent map,
  two teams (notifications-svc and auth-svc) share the same owner team
  (@platform-platform) but different leads, and the on-call rotation is
  conditional on week parity — collapsing it to "the SRE team" or naming
  the wrong lead for the platform-owned services loses points.

  NOTE (read-layer gating): the live snapshot read surfaces only topology
  entities (Service / DataStore + DEPENDS_ON / USES); ownership and on-call
  edges are NOT structurally returned, so owners/on-call/DBA are graded in
  the synthesis judge. We anchor the structural floor on the canonical
  Service set and forbid Service nodes minted from person handles.

ingest:
  - { event: notion/oncall_rotation.json, at: "-10d", tags: [signal] }
  - { event: slack/infra_thread__oncall_handoff.json, at: "-7d", tags: [signal] }

distractor_events:
  - { event: noise/slack_chatter_noise_template.json, at: "-30d..-2d", count: 12 }
  - { event: noise/alerting_noise_template.json, at: "-25d..-2d", count: 6 }

post_ingest_assertions:
  graph_must_contain_entities:
    - { label: Service, min_count: 7 }
    - { label: Service, key_pattern: "service:.*notifications-svc", min_count: 1 }
    - { label: Service, key_pattern: "service:.*auth-svc", min_count: 1 }
  graph_must_not_contain:
    - { label: Service, key_pattern: "(?i)(bench-user|on-?call|rotation|dba)", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: onboarding
  scope: { topic: ownership }
  include: [infra_topology, owners, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [infra_topology]
  source_refs_min: 2
  must_cite_event_id:
    - universe/acme/10-team.json
    - notion/oncall_rotation.json
  must_not_cite_event_id:
    - noise/slack_chatter_noise_template.json
    - noise/alerting_noise_template.json

judge:
  pass_score: 55
  criteria:
    - name: owner_per_service
      weight: 34
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer give the correct owner team AND lead per service —
        checkout-api @platform-checkout/bench-user-1, inventory-svc
        @platform-data/bench-user-2, payments-svc @platform-payments/
        bench-user-3, notifications-svc @platform-platform/bench-user-13,
        auth-svc @platform-platform/bench-user-14, analytics-pipeline
        @data-platform/bench-user-11? Note notifications-svc and auth-svc
        share the @platform-platform team but have DIFFERENT leads
        (bench-user-13 vs bench-user-14); conflating them fails this.
    - name: oncall_rotation
      weight: 30
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer state the SRE primary on-call rotation — bench-user-4
        on ODD ISO weeks, bench-user-5 on EVEN ISO weeks — and that the
        service lead is the secondary escalation for their own service?
        Collapsing it to "the SRE team is on-call" with no week parity
        fails this.
    - name: dba_escalation
      weight: 22
      pass_threshold: 3
      dimensions: [INFRA]
      prompt: |
        Does the answer name bench-user-6 as the DBA — the required
        reviewer / escalation for schema migration or pool-ceiling changes
        on the Postgres datastores, looped in after the SRE primary on DB
        incidents?
    - name: no_invented_services
      weight: 14
      pass_threshold: 5
      dimensions: [INFRA]
      prompt: |
        Are all services named drawn from the canonical Acme service list
        (checkout-api, inventory-svc, payments-svc, notifications-svc,
        auth-svc, web-app, analytics-pipeline)? Inventing a service, or
        treating a person (bench-user-N) or a team handle as a service,
        fails this criterion.
