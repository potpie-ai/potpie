id: bug_stripe_webhook_idempotency
use_case: BUG
tier: extended
difficulty: medium
source_mix: full
universe: acme

description: |
  Some customers were refunded twice today; the duplicate_charge_captured_rate
  monitor is firing for payments-svc. The duplicates are on the NEW
  refund-payout webhook handler (PR #1192) that listens to Stripe
  `payout.paid` events and does refund bookkeeping + emails inline before
  returning. A new engineer files OPS-470.

  Ground truth: this recurs OPS-312. Stripe redelivers a webhook if the
  endpoint doesn't 2xx fast enough; the prior `charge.captured` handler had
  no idempotency guard, so a retried delivery was processed twice → double
  capture. PR #934 fixed it: persist the processed Stripe `event.id` in a
  `stripe_webhook_events` table with a unique constraint, no-op (return 200)
  on conflict, and return 200 fast / do heavy work async. The rule: every
  externally-retried webhook handler MUST be idempotent on the provider event
  id. The new refund handler repeated the original mistake.

  A strong answer surfaces OPS-312 + PR #934, recognises the
  duplicate-processing-of-retried-webhook pattern, and recommends making the
  new handler idempotent on the Stripe event id (dedupe table) + returning
  200 fast.

  Medium tier: linear + github + alerting.

ingest:
  - { event: linear/bug_stripe_dup_prior.json, at: "-125d", tags: [signal] }
  - { event: github/bug_stripe_idempotency_fix.json, at: "-123d", tags: [signal] }
  - { event: alerting/bug_stripe_today_alert.json, at: "0d", tags: [signal] }
  - { event: linear/bug_stripe_today.json, at: "0d", tags: [signal] }

distractor_events:
  - { event: noise/alerting_noise_template.json, at: "-60d..-2d", count: 8 }
  - { event: noise/linear_issue_noise_template.json, at: "-90d..-2d", count: 8 }

post_ingest_assertions:
  # NOTE (read-layer gating): Issue/PR/Alert nodes are reconciled but the
  # topology read surfaces only Service/DataStore. Case retrieval graded in
  # retrieval + judge. Anchor on payments-svc.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*payments-svc", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: payments-svc }
  include: [prior_bugs, infra_topology, timeline]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [prior_bugs]
  source_refs_min: 2
  must_cite_event_id:
    - linear/bug_stripe_dup_prior.json
    - github/bug_stripe_idempotency_fix.json
  forbid_in_answer:
    - "I don't have information"
    - "no prior incidents"

judge:
  pass_score: 65
  criteria:
    - name: surfaces_prior_incident
      weight: 30
      pass_threshold: 4
      prompt: |
        Does the answer reference OPS-312 (the prior duplicate-capture
        incident) by identifier and surface PR #934's idempotency fix
        (dedupe on Stripe event.id via stripe_webhook_events unique key)?
    - name: identifies_recurrence_pattern
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer explain the root cause — Stripe redelivers webhooks
        on slow/no 2xx, and a handler without an idempotency guard processes
        the same event twice — and connect today's refund-payout handler to
        that same class as OPS-312?
    - name: actionable_first_steps
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer recommend making the new refund handler idempotent on
        the Stripe event id (dedupe table / unique key, no-op on conflict)
        and returning 200 fast with heavy work async?
    - name: no_hallucination
      weight: 20
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid references: OPS-312, OPS-470, PR #934,
        PR #1192, Stripe, payout.paid, charge.captured, stripe_webhook_events,
        payments-svc, bench-user-3, bench-user-17. Other PRs/services/people
        are hallucinations.
