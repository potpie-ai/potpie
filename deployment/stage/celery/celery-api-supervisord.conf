; Supervisord layout for staging celery-api pod.
;
; Queues split across separate worker programs so a long parsing/agent batch
; doesn't starve fast queues (webhooks, context-graph reconciliation).
;
; Only [program:celery] runs ``alembic upgrade heads`` to avoid concurrent
; migration races at pod start.
;
; Do not ``source /app/.env`` in shell: keys with hyphens (e.g.
; META-LLAMA_API_KEY) break bash. The app and alembic load .env via
; load_dotenv(); CELERY_QUEUE_NAME and CONTEXT_GRAPH_ENABLED should be set
; as Kubernetes environment variables on the deployment.
;
; Note on supervisord substitution: ``%`` starts a Python-style substitution,
; so a literal ``%`` (e.g. for ``%h`` in ``celery -n``) must be doubled to ``%%``.

[supervisord]
nodaemon=true
loglevel=debug

; ─────────────────────────────────────────────────────────────────────────
; Celery: parsing (process_repository) + agent tasks. Runs alembic on boot.
; ─────────────────────────────────────────────────────────────────────────
[program:celery]
command=/bin/bash -c 'alembic upgrade heads && echo "Starting Celery Worker with New Relic..." && newrelic-admin run-program celery -A app.celery.celery_app worker --loglevel=debug -Q "${CELERY_QUEUE_NAME}_process_repository,${CELERY_QUEUE_NAME}_agent_tasks" -n parsing_agent@%%h -E --concurrency=3'
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
user=root

; ─────────────────────────────────────────────────────────────────────────
; Celery: context-graph reconciliation (context-graph-etl queue).
; Skips startup when CONTEXT_GRAPH_ENABLED is false/0/no/off so unconsumed
; messages don't pile up in Redis. ``FOR UPDATE SKIP LOCKED`` on the batch
; claim makes multi-replica draining safe.
; ─────────────────────────────────────────────────────────────────────────
[program:celery_context]
command=/bin/bash -c 'cg="${CONTEXT_GRAPH_ENABLED:-true}"; cg_lc=$(printf "%%s" "$cg" | tr "[:upper:]" "[:lower:]"); if [ "$cg_lc" = "false" ] || [ "$cg_lc" = "0" ] || [ "$cg_lc" = "no" ] || [ "$cg_lc" = "off" ]; then echo "CONTEXT_GRAPH_ENABLED=$cg → context-graph worker not starting"; exit 0; fi; echo "Starting Celery: context-graph..." && newrelic-admin run-program celery -A app.celery.celery_app worker --loglevel=debug -Q context-graph-etl -n context@%%h -E --concurrency=${CELERY_CONTEXT_CONCURRENCY:-2}'
autostart=true
autorestart=unexpected
exitcodes=0
priority=20
stopwaitsecs=600
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
user=root

; ─────────────────────────────────────────────────────────────────────────
; Celery: webhooks / external events (external-event queue). Fast, bursty.
; ─────────────────────────────────────────────────────────────────────────
[program:celery_events]
command=/bin/bash -c 'echo "Starting Celery: events..." && newrelic-admin run-program celery -A app.celery.celery_app worker --loglevel=debug -Q external-event -n events@%%h -E --concurrency=${CELERY_EVENTS_CONCURRENCY:-4}'
autostart=true
autorestart=true
priority=20
stopwaitsecs=120
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
user=root
