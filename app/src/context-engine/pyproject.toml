[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-engine"
version = "0.1.0"
description = "Context graph API, webhooks, CLI, and MCP (hexagonal)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "mcp>=1.0.0",
    "rich>=13.0",
    "typer>=0.15.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
postgres = [
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
]
graph = [
    "graphiti-core>=0.28.0",
    "neo4j>=5.28.0",
]
github = [
    "pygithub>=2.8.0",
]
all = [
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "graphiti-core>=0.28.0",
    "neo4j>=5.28.0",
    "pygithub>=2.8.0",
]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.8.0",
]

[project.scripts]
context-engine = "adapters.inbound.cli.main:main"
context-engine-mcp = "adapters.inbound.mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "adapters", "bootstrap"]

[tool.hatch.build.targets.sdist]
include = ["domain", "application", "adapters", "bootstrap"]

[tool.ruff]
target-version = "py310"
src = [".", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
