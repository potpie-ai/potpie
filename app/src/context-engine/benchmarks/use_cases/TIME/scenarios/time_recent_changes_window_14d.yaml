id: time_recent_changes_window_14d
use_case: TIME
tier: quick
difficulty: easy
source_mix: single
universe: acme
light: true

description: |
  An agent is asked: "what changed in checkout-api in the last 14 days?"

  The engine should return PR #1142 (idempotency, merged -7d) and
  PR #1151 (telemetry, merged -2d) in chronological order, and must
  NOT mention PR #998 (the inventory-svc black-formatting PR from
  -79d). The window check is the whole point of this scenario — a
  TIME scenario that returns "all changes" without honouring the
  14-day window fails its precision sub-axis.

  Distractor: PR #998 is loaded into the same pot but is outside the
  window AND outside the scope (it's inventory-svc, not checkout-api).
  The retrieval evaluator's `must_not_cite_event_id` + the temporal
  window check enforce both.

ingest:
  - { event: github/pr_merged__1142__checkout_idempotency.json, at: "-7d", tags: [signal] }
  - { event: github/pr_merged__1151__checkout_telemetry.json, at: "-2d", tags: [signal] }
  - { event: github/pr_merged__998__inventory_unrelated.json, at: "-79d", tags: [distractor] }

post_ingest_assertions:
  # NOTE (read-layer gating): PR-tier entities are reconciled into the
  # timeline (Activity/Period) but the current topology query/read path does
  # not surface PullRequest nodes, so they cannot be asserted structurally
  # here. The window + ordering behaviour — the actual point of a TIME
  # scenario — is graded in retrieval_assertions.temporal below. We anchor
  # the structural floor on the checkout-api Service the PRs touch (readable
  # topology from the universe seed).
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: review
  scope: { service: checkout-api, window_days: 14 }
  include: [timeline, infra_topology]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline]
  source_refs_min: 2
  must_cite_event_id:
    - github/pr_merged__1142__checkout_idempotency.json
    - github/pr_merged__1151__checkout_telemetry.json
  must_not_cite_event_id:
    - github/pr_merged__998__inventory_unrelated.json
  temporal:
    must_order_correctly: true
    window: { from: "-14d", to: "0d" }
    out_of_window_refs_max: 0

judge:
  pass_score: 65
  criteria:
    - name: correct_chronology
      weight: 30
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer present the changes in chronological order
        (PR #1142 before PR #1151, since #1142 merged first)? Random
        order is acceptable only if both are accompanied by their
        merge dates; otherwise this criterion fails.
    - name: correct_window_bounds
      weight: 30
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer restrict itself to PRs merged within the last
        14 days? Specifically, PR #998 (inventory-svc black reformat,
        merged ~79 days ago) must NOT appear in the answer. If #998
        is mentioned at all, fail this criterion.
    - name: change_attribution
      weight: 25
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer name PR numbers, authors (bench-user-1), and
        approximate merge dates for each surfaced change? Anonymous
        "recent improvements" is not enough.
    - name: links_change_to_effect
      weight: 15
      pass_threshold: 2
      dimensions: [TIME]
      prompt: |
        Does the answer briefly describe what each PR changed
        functionally (idempotency for orders; OTEL spans on order/
        payment paths)? Just listing titles passes; explaining what
        a debugger should care about earns the full mark.
