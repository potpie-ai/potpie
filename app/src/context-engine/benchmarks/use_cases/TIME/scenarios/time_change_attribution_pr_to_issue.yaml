id: time_change_attribution_pr_to_issue
use_case: TIME
tier: quick
difficulty: easy
source_mix: dual
universe: acme

description: |
  An agent is asked: "Which PRs closed which Linear issues on checkout-api
  recently, and in what order did they land?"

  This is a change-attribution question: the engine must map each merged PR
  back to the issue it closed and present the two fixes in chronological
  order. Both PR bodies contain an explicit "Closes CHK-NNN" reference, so a
  correct answer pairs them precisely rather than guessing.

  Ground truth, in chronological order:
    1. PR #1160 "compute cart total once to stop discount rounding drift"
       merged -9d (2026-05-16), authored by bench-user-1, CLOSES CHK-401
       ("Discount rounding off-by-one on multi-item carts", filed -13d).
    2. PR #1167 "48h TTL on guest carts + janitor sweep" merged -4d
       (2026-05-21), authored by bench-user-1, CLOSES CHK-407
       ("Guest carts never expire, leaking rows", filed -8d).

  The hard part is the *pairing plus order*: PR #1160 must be attributed to
  CHK-401 (not CHK-407) and must be reported BEFORE PR #1167, because it
  merged five days earlier. Swapping the issue↔PR mapping, or listing the
  newer PR first, fails the chronology / attribution criteria. Both PRs and
  both issues fall inside the 14-day window, so nothing should be excluded by
  the window here — recency only governs ORDER.

ingest:
  - { event: linear/issue_create__CHK-401__discount_rounding.json, at: "-13d", tags: [signal] }
  - { event: linear/issue_create__CHK-407__guest_cart_expiry.json, at: "-8d", tags: [signal] }
  - { event: github/pr_merged__1160__fix_discount_rounding.json, at: "-9d", tags: [signal] }
  - { event: github/pr_merged__1167__guest_cart_ttl.json, at: "-4d", tags: [signal] }

post_ingest_assertions:
  # NOTE (read-layer gating): PullRequest/Issue/Person nodes are reconciled
  # into the timeline but the current topology query/read path surfaces only
  # topology entities (Service/DataStore + DEPENDS_ON/USES). The PR<->issue
  # attribution + ordering that this scenario measures is graded via
  # retrieval_assertions.temporal + the judge. We anchor the structural floor
  # on the checkout-api Service both PRs touch (readable topology from seed).
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: review
  scope: { service: checkout-api, window_days: 14 }
  include: [timeline, infra_topology]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline]
  source_refs_min: 2
  must_cite_event_id:
    - github/pr_merged__1160__fix_discount_rounding.json
    - github/pr_merged__1167__guest_cart_ttl.json
  must_not_cite_event_id:
    - github/pr_merged__998__inventory_unrelated.json
  temporal:
    must_order_correctly: true
    window: { from: "-14d", to: "0d" }
    out_of_window_refs_max: 0

judge:
  pass_score: 75
  criteria:
    - name: correct_pr_issue_mapping
      weight: 35
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer correctly pair each PR with the issue it closed —
        PR #1160 → CHK-401 (discount rounding) and PR #1167 → CHK-407 (guest
        cart TTL)? A swapped or missing mapping fails this criterion. The
        pairing is stated explicitly ("Closes CHK-NNN") in each PR body.
    - name: chronological_order
      weight: 30
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer present the two fixes in chronological merge order —
        PR #1160 (merged ~9 days ago) BEFORE PR #1167 (merged ~4 days ago)?
        Reversed order, or order presented without dates, fails.
    - name: authors_and_dates
      weight: 20
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer name the author (bench-user-1) and an approximate
        merge date for each PR? Anonymous "two recent fixes" without
        attribution or dates does not pass.
    - name: no_hallucination
      weight: 15
      pass_threshold: 5
      dimensions: [TIME]
      prompt: |
        Are all factual claims grounded? Valid identifiers: PR #1160, PR
        #1167, CHK-401, CHK-407, checkout-api, bench-user-1. Any other PR
        numbers, issue identifiers, person names, or file paths that do not
        appear in the supporting data are hallucinations and fail this
        criterion.
