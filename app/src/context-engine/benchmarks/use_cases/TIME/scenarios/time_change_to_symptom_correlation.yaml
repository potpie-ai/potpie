id: time_change_to_symptom_correlation
use_case: TIME
tier: quick
difficulty: medium
source_mix: dual
universe: acme

description: |
  An agent is asked: "checkout-api started throwing 5xx errors a few days
  ago — what changed right before that?"

  This is a change-to-symptom correlation question. The engine must connect a
  prod deployment to the error spike that followed it and reason about the
  short lag between the two.

  Ground truth, in chronological order:
    1. Deploy rev-8c41a9 of checkout-api to prod at -3d 15:00
       (2026-05-22 15:00 UTC), deployed_by bench-user-1.
    2. Sentry "checkout-api error rate (Sentry)" alert FIRES at -3d 15:22
       (2026-05-22 15:22 UTC) — 5xx rate on /orders hits 4.8% against a 2.0%
       threshold. This is 22 minutes AFTER the deploy.
    3. The same alert RESOLVES at -3d 16:02 (2026-05-22 16:02 UTC), ~40 min
       after firing, once the bad revision was hotfixed.

  The hard part is the *temporal correlation*: the deploy and the alert are
  separate sources (deploy connector vs. alerting connector) with no explicit
  link between them — the only thing that ties them together is that the alert
  fired ~22 minutes after the deploy, on the same service and environment. A
  correct answer surfaces the deploy as the most plausible trigger, calls out
  the ~22-minute lag, and notes the spike resolved ~40 minutes later. It must
  NOT invent a root cause beyond "the deploy preceded the spike."

  Window is -7d to 0d; all three events fall inside it, so the window only
  governs which changes are in-scope, not exclusion.

ingest:
  - { event: deploy/deploy_success__checkout_api__prod__rev_8c41.json, at: "-3d", tags: [signal] }
  - { event: alerting/alert_fired__checkout_error_rate__rev_8c41.json, at: "-3d", tags: [signal] }
  - { event: alerting/alert_resolved__checkout_error_rate__rev_8c41.json, at: "-3d", tags: [signal] }

post_ingest_assertions:
  # NOTE (read-layer gating): Deployment/Alert/Activity nodes are reconciled
  # onto the timeline but the topology query/read path surfaces only topology
  # entities (Service/DataStore + DEPENDS_ON/USES). The deploy<->spike
  # correlation this scenario measures is graded via retrieval + the judge.
  # We anchor the structural floor on the checkout-api Service.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: checkout-api, window_days: 7 }
  include: [timeline, infra_topology]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [timeline]
  source_refs_min: 2
  must_cite_event_id:
    - deploy/deploy_success__checkout_api__prod__rev_8c41.json
    - alerting/alert_fired__checkout_error_rate__rev_8c41.json
  must_not_cite_event_id:
    - github/pr_merged__998__inventory_unrelated.json
  temporal:
    must_order_correctly: true
    window: { from: "-7d", to: "0d" }
    out_of_window_refs_max: 0

judge:
  pass_score: 65
  criteria:
    - name: links_deploy_to_spike
      weight: 35
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer connect the prod deploy of checkout-api (rev-8c41a9,
        -3d 15:00) to the 5xx error-rate spike that followed, identifying the
        deploy as the most plausible trigger of the spike? Mentioning the
        spike without tying it to the deploy fails this criterion.
    - name: quantifies_lag
      weight: 25
      pass_threshold: 3
      dimensions: [TIME]
      prompt: |
        Does the answer note the short lag between the deploy (15:00) and the
        alert firing (15:22) — roughly 20-25 minutes? An answer that gets the
        ordering right and references the proximity in time passes; one that
        gives the wrong order or omits any sense of how soon the spike
        followed fails.
    - name: correct_window_bounds
      weight: 25
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the answer restrict itself to events in the last 7 days, and not
        drag in unrelated out-of-scope changes (e.g. the inventory-svc PR
        #998)? Citing anything outside checkout-api's recent activity fails.
    - name: no_hallucination
      weight: 15
      pass_threshold: 5
      dimensions: [TIME]
      prompt: |
        Are all factual claims grounded? Valid identifiers: checkout-api,
        rev-8c41a9, the Sentry error-rate monitor, the 4.8% value / 2.0%
        threshold, bench-user-1. The answer should NOT assert a specific
        code-level root cause that is not in the supporting data — the only
        supported claim is that the deploy immediately preceded the spike.
