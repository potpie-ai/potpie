id: infra_secret_routing
use_case: INFRA
tier: quick
difficulty: hard
source_mix: dual
universe: acme

description: |
  A security reviewer asks where each service reads its secrets and, in
  particular, which service holds the Stripe live key. The agent must
  reconstruct the secret-routing model and the least-privilege boundary
  between checkout-api and payments-svc.

  Ground-truth (from `universe/acme/11-environments-secrets.json` plus the
  #infra slack thread):
    - All secrets live in AWS Secrets Manager, one path per service per
      env: `acme/<env>/<service>` (e.g. `acme/prod/checkout-api`).
    - Each service reads ONLY its own path, via its IRSA-bound k8s service
      account `sa-<service>`. No service can read another service's secret
      (least privilege).
    - The Stripe LIVE secret key (`sk_live_*`) lives in exactly ONE place:
      `acme/prod/payments-svc`. payments-svc is the only holder.
    - checkout-api does NOT hold a Stripe live key — `acme/prod/checkout-api`
      contains only a `STRIPE_KEY_REF` (a reference); checkout-api calls
      payments-svc for capture.
    - dev/staging use Stripe test mode (`sk_test_*`); there is no live key
      anywhere outside prod.

  Why it's hard: the tempting (wrong) answer is that checkout-api, being
  the checkout service, holds the Stripe key. The correct answer inverts
  that — checkout-api holds only a reference, payments-svc holds the only
  live key — and grounds it in the per-service-per-env path scheme and the
  IRSA least-privilege boundary. The slack thread exists precisely to
  disambiguate this for an audit.

  NOTE (read-layer gating): the live snapshot read surfaces only topology
  entities (Service / DataStore + DEPENDS_ON / USES). Secret paths and the
  least-privilege rule are NOT structurally returned; they are graded in
  the synthesis judge. We anchor the structural floor on the canonical
  Service set and on payments-svc specifically, and forbid Service nodes
  minted from secret/credential strings.

ingest:
  - { event: slack/infra_thread__stripe_secret_routing.json, at: "-4d", tags: [signal] }

distractor_events:
  - { event: noise/slack_chatter_noise_template.json, at: "-30d..-2d", count: 12 }
  - { event: noise/github_chore_noise_template.json, at: "-40d..-3d", count: 10 }

post_ingest_assertions:
  graph_must_contain_entities:
    - { label: Service, min_count: 7 }
    - { label: Service, key_pattern: "service:.*payments-svc", min_count: 1 }
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  graph_must_not_contain:
    - { label: Service, key_pattern: "(?i)(sk_live|sk_test|stripe_key_ref|secrets.?manager|irsa)", max_count: 0 }
    - { label: Service, key_pattern: "type:chore", max_count: 0 }
  no_orphan_entities: false
  precision_floor: 90
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: operations
  scope: { topic: secrets }
  include: [infra_topology, owners, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [infra_topology]
  source_refs_min: 2
  must_cite_event_id:
    - universe/acme/11-environments-secrets.json
    - slack/infra_thread__stripe_secret_routing.json
  must_not_cite_event_id:
    - noise/slack_chatter_noise_template.json
    - noise/github_chore_noise_template.json

judge:
  pass_score: 55
  criteria:
    - name: secret_path_scheme
      weight: 24
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer state that secrets live in AWS Secrets Manager with
        one path per service per env, named `acme/<env>/<service>` (e.g.
        `acme/prod/checkout-api`)? A vague "secrets are in a vault" with no
        path scheme fails this.
    - name: payments_holds_only_stripe_live
      weight: 30
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer state that the Stripe LIVE key (`sk_live_*`) lives
        in exactly ONE place — `acme/prod/payments-svc` — and that
        payments-svc is the only holder? Naming any other service as the
        live-key holder fails this.
    - name: checkout_holds_only_reference
      weight: 24
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the answer state that checkout-api does NOT hold a Stripe live
        key — it holds only a reference (`STRIPE_KEY_REF`) and calls
        payments-svc for capture? Claiming checkout-api holds the live key
        is the canonical wrong answer and fails this criterion.
    - name: least_privilege_boundary
      weight: 12
      pass_threshold: 3
      dimensions: [INFRA]
      prompt: |
        Does the answer convey least privilege — each service reads only
        its own `acme/<env>/<service>` path (via the IRSA-bound
        `sa-<service>` account) and no service can read another's secret,
        and that dev/staging use Stripe test mode so no live key exists
        outside prod?
    - name: no_invented_services
      weight: 10
      pass_threshold: 5
      dimensions: [INFRA]
      prompt: |
        Are all services named drawn from the canonical Acme service list
        (checkout-api, inventory-svc, payments-svc, notifications-svc,
        auth-svc, web-app, analytics-pipeline)? Treating a secret string,
        Stripe, AWS Secrets Manager, or IRSA as if it were one of Acme's
        own services fails this criterion.
