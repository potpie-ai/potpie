id: bug_oom_kafka_consumer
use_case: BUG
tier: quick
difficulty: easy
source_mix: dual
universe: acme

description: |
  notifications-svc Kafka-consumer pods are OOM-killed (exit 137) under
  orders-topic backlog. There is a clean prior precedent the engine should
  surface.

  Ground truth: ~120 days ago, OPS-301 hit the exact same failure —
  the consumer materialised the entire `max.poll.records=5000` batch (each
  message holding a rendered HTML email body) into memory before committing,
  so RSS blew past the 512Mi pod limit under backlog and the pod was
  OOM-killed every ~40 min. PR #910 fixed it: dropped max.poll.records to
  500, stream-processed the batch, freed each body right after enqueue.
  Memory went flat at ~180Mi.

  Today (OPS-410): a new engineer reports notifications-svc pods restarting
  with exit 137 during the morning burst. They shipped a bigger "order
  shipped" email template last week (PR #1180) with inline images, and a
  SendGrid slowdown built a backlog. Same unbounded-buffer-under-backlog
  root-cause class — the bigger template just makes the memory pressure
  worse.

  A strong answer recognises OPS-301 as the prior, surfaces PR #910's fix
  (bounded poll + stream processing), and recommends checking
  max.poll.records / the per-message memory hold rather than just bumping
  the pod limit (which the filer already tried).

  Easy tier: two sources (linear + github), low distractor ratio, recent
  and signal-dense.

ingest:
  - { event: linear/bug_oom_prior_incident.json, at: "-120d", tags: [signal] }
  - { event: github/bug_oom_fix_pr.json, at: "-118d", tags: [signal] }
  - { event: linear/bug_oom_today.json, at: "0d", tags: [signal] }

distractor_events:
  - { event: noise/linear_issue_noise_template.json, at: "-60d..-3d", count: 4 }

post_ingest_assertions:
  # NOTE (read-layer gating): Issue/PR nodes are reconciled but the topology
  # read surfaces only Service/DataStore. Recurrence detection is graded in
  # retrieval + the judge. Anchor on the notifications-svc Service.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*notifications-svc", min_count: 1 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: debugging
  scope: { service: notifications-svc }
  include: [prior_bugs, infra_topology, timeline]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [prior_bugs]
  source_refs_min: 2
  must_cite_event_id:
    - linear/bug_oom_prior_incident.json
    - github/bug_oom_fix_pr.json
  forbid_in_answer:
    - "I don't have information"
    - "no prior incidents"

judge:
  pass_score: 75
  criteria:
    - name: surfaces_prior_incident
      weight: 30
      pass_threshold: 4
      prompt: |
        Does the answer reference OPS-301 (the prior notifications-svc
        consumer OOM from ~120 days ago) by identifier and surface its fix
        PR #910 (drop max.poll.records to 500 + stream-process the batch +
        free the rendered body)?
    - name: identifies_recurrence_pattern
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer recognise today's exit-137 OOM as the same
        unbounded-buffer-under-backlog root-cause class as OPS-301 (made
        worse by the larger email template), rather than a novel issue?
    - name: actionable_first_steps
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the answer recommend the prior fix's lever — inspect/lower
        max.poll.records and stop holding the whole batch / rendered bodies
        in memory — rather than only bumping the pod memory limit (which the
        filer already tried and which only delays the OOM)?
    - name: no_hallucination
      weight: 20
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid identifiers: OPS-301, OPS-410,
        PR #910, PR #1180, notifications-svc, orders-topic, SendGrid,
        max.poll.records, bench-user-13, bench-user-16. Any other PRs,
        services, or people are hallucinations and fail this criterion.
