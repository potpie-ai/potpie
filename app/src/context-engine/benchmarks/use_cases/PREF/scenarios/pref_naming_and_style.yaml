id: pref_naming_and_style
use_case: PREF
tier: quick
difficulty: hard
source_mix: single
universe: acme

description: |
  An engineer asks the agent: "What are this team's naming and style
  conventions for Python?" There is NO ADR that states them. The
  conventions exist only as a pattern that accumulates across repeated
  GitHub PR review comments, made by different reviewers, on different
  PRs, across different services, over several weeks. The engine's job
  is to recognise that the same guidance keeps recurring and promote it
  into a stable, citable rule even though no single document declares it.

  The four review comments, in chronological order, each enforce one
  facet:
    1. PR #1180 (bench-user-3, checkout-api/totals.py) — Python
       functions are snake_case; no camelCase for functions or locals
       (`getOrderTotal` → `get_order_total`, `lineItems` → `line_items`).
    2. PR #1188 (bench-user-2, inventory-svc/stock.py) — no
       abbreviations in public/exported names (`calc_inv_qty` →
       `calculate_inventory_quantity`, `RetryCfg` → `RetryConfig`).
    3. PR #1195 (bench-user-1, payments-svc/gateway.py) — module-level
       constants must be UPPER_SNAKE_CASE (`maxRetries` → `MAX_RETRIES`,
       `default_timeout` → `DEFAULT_TIMEOUT`); also re-flags camelCase.
    4. PR #1202 (bench-user-3, checkout-api/reconcile.py) — no
       one-letter variable names except loop indices (`i`/`j`/`k`) and
       the conventional comprehension throwaway (`o` → `order`, etc.).

  Ground truth (the four accumulated rules):
    - snake_case for functions and variables; no camelCase;
    - spell out public/exported names — no abbreviations;
    - module-level constants are UPPER_SNAKE_CASE;
    - no one-letter variables except loop indices.

  Why it's hard: (1) there is no authoritative document to cite — the
  rule must be synthesised from repeated weak signals; (2) the four
  comments are scattered across three services and four PRs and buried
  in heavy distractor noise (~25:1); (3) the engine must distinguish a
  genuine recurring convention from one-off nits. The judge checks that
  the answer surfaces the *accumulated* convention and cites at least
  two of the review threads as evidence — without inventing rules that
  no reviewer actually stated.

ingest:
  - { event: github/pref_review__1180__snake_case_naming.json, at: "-43d", tags: [signal] }
  - { event: github/pref_review__1188__no_abbreviations.json, at: "-36d", tags: [signal] }
  - { event: github/pref_review__1195__module_constants_upper_snake.json, at: "-31d", tags: [signal] }
  - { event: github/pref_review__1202__no_one_letter_vars.json, at: "-23d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-45d..-2d", count: 60 }
  - { event: noise/linear_issue_noise_template.json, at: "-45d..-2d", count: 25 }
  - { event: noise/slack_chatter_noise_template.json, at: "-45d..-2d", count: 15 }

post_ingest_assertions:
  # NOTE (read-layer gating): the style/naming convention here is a
  # promoted preference synthesised from repeated PR-review enforcement
  # events (no ADR Document at all). The reconciled preference/decision
  # tier is not surfaced by the topology read path (Service/DataStore +
  # DEPENDS_ON/USES only), so it cannot be asserted structurally — the
  # accumulation-into-a-rule capability is graded entirely in the judge.
  # We anchor the structural floor on the services the reviews touch and
  # hold the precision line against the heavy distractor noise.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*(checkout-api|inventory-svc|payments-svc)", min_count: 1 }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: review
  scope: { repo: "acme/platform" }
  include: [coding_preferences, decisions, docs]
  mode: deep
  source_policy: summary

retrieval_assertions:
  required_includes_used: [coding_preferences]
  source_refs_min: 2
  must_cite_event_id:
    - github/pref_review__1180__snake_case_naming.json
    - github/pref_review__1195__module_constants_upper_snake.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/linear_issue_noise_template.json
    - noise/slack_chatter_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no naming conventions"
    - "no documented style"

judge:
  pass_score: 55
  criteria:
    - name: surfaces_accumulated_convention
      weight: 30
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer surface the team's naming/style convention even
        though NO ADR states it — i.e. does it recognise the convention
        exists as accumulated practice? Critically, an answer that says
        "there is no documented style convention" because it found no ADR
        must FAIL — the whole point is promoting repeated review guidance
        into a stated rule.
    - name: covers_the_four_facets
      weight: 30
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer state the actual accumulated rules? The four
        facets are: (1) snake_case for functions/variables, no camelCase;
        (2) no abbreviations in public/exported names; (3) module-level
        constants UPPER_SNAKE_CASE; (4) no one-letter variables except
        loop indices. Pass = at least 3 of the 4 stated correctly. Fewer
        than 3, or a garbled facet, fails.
    - name: cites_review_evidence
      weight: 20
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer cite the PR review threads as the evidence for
        the convention (e.g. references to the totals.py / gateway.py /
        stock.py / reconcile.py reviews or their PR numbers
        #1180/#1188/#1195/#1202), framing them as repeated enforcement
        rather than a single source? At least two distinct review threads
        must be cited.
    - name: no_invented_rules
      weight: 20
      pass_threshold: 5
      dimensions: [PREF]
      prompt: |
        Does the answer avoid inventing conventions no reviewer stated?
        The ONLY valid accumulated rules are the four facets above.
        Adding fabricated rules (e.g. "max line length 88", "type hints
        mandatory", "Google-style docstrings") that none of the four
        review comments mention is a hallucination and must fail this
        criterion. Citing a non-existent ADR for these rules also fails.
