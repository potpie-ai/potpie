id: pref_api_versioning
use_case: PREF
tier: extended
difficulty: medium
source_mix: dual
universe: acme

description: |
  An engineer needs to make a breaking change to a public checkout-api
  endpoint (the response shape changes) and asks the agent how this team
  versions and deprecates public APIs. Two sources reinforce the same
  policy:

    - ADR-040 (`docs/adr/040-api-versioning.md`, a scenario-local
      fixture) — the canonical decision: version lives in the URL path
      (`/api/v2`), never a header; additive-only within a published
      version (adding optional fields/endpoints is fine, but removing,
      renaming, retyping, or tightening validation is breaking and needs
      a new version); deprecations run a 90-day window signalled with a
      machine-readable `Sunset` header (+ `Deprecation: true`).
    - A Notion how-to page that operationalises ADR-040 into a
      step-by-step: mount the new router under `/api/v2`, keep `/api/v1`
      unchanged (CI schema-diff fails a non-additive change to a
      published version), pick a sunset date 90 days out, add the
      `Sunset`/`Deprecation` headers, watch the per-version gateway
      metric drain before removal.

  Ground truth: because the change is breaking (response shape changes),
  it must ship under a NEW URL version (`/api/v2`), not by mutating
  `/api/v1`; the version goes in the URL path, not a header; and the old
  version, once deprecated, must carry a `Sunset` header 90 days out.

  Why it's hard: the engine must (1) classify the proposed change as
  *breaking* under the additive-only rule (a response-shape change is
  not additive), (2) therefore prescribe a new URL version rather than
  an in-place edit, and (3) recall the 90-day `Sunset` deprecation
  mechanic for draining the old version — all from an ADR that is local
  to this scenario plus its Notion companion, with no other corroborating
  signal.

ingest:
  - { event: repo_docs/pref_adr_040_api_versioning.json, at: "-30d", tags: [signal] }
  - { event: notion/pref_api_versioning_runbook.json, at: "-27d", tags: [signal] }

distractor_events:
  - { event: noise/github_chore_noise_template.json, at: "-40d..-5d", count: 12 }
  - { event: noise/linear_issue_noise_template.json, at: "-42d..-6d", count: 6 }

post_ingest_assertions:
  # NOTE (read-layer gating): the scenario-local ADR-040 (Document/
  # Decision) and the Notion companion page are reconciled, but the
  # topology read path surfaces only Service/DataStore + DEPENDS_ON/USES —
  # not Document/Decision nodes. We anchor the structural floor on the
  # checkout-api Service whose public API is being versioned and grade the
  # versioning capability via retrieval + judge.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 4
    failed_events_max: 0

query:
  intent: feature
  scope: { service: checkout-api }
  include: [coding_preferences, decisions, docs]
  mode: balanced
  source_policy: summary

retrieval_assertions:
  required_includes_used: [coding_preferences]
  source_refs_min: 2
  must_cite_event_id:
    - repo_docs/pref_adr_040_api_versioning.json
    - notion/pref_api_versioning_runbook.json
  must_not_cite_event_id:
    - noise/github_chore_noise_template.json
    - noise/linear_issue_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no versioning policy"

judge:
  pass_score: 65
  criteria:
    - name: classifies_change_as_breaking
      weight: 25
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer correctly classify the proposed response-shape
        change as a BREAKING change under ADR-040's additive-only rule
        (you may add optional fields/endpoints within a version, but
        changing an existing response shape is not additive), and
        therefore say it must NOT be done in-place on `/api/v1`? An
        answer that treats a response-shape change as safe within the
        existing version fails.
    - name: url_path_versioning
      weight: 25
      pass_threshold: 4
      dimensions: [PREF]
      prompt: |
        Does the answer prescribe shipping the breaking change under a
        new URL version (`/api/v2`), and state that the version lives in
        the URL path, NOT in an `Accept` or custom header (ADR-040 §1)?
        An answer that suggests header-based versioning fails.
    - name: deprecation_window_and_sunset
      weight: 25
      pass_threshold: 3
      dimensions: [PREF]
      prompt: |
        Does the answer describe the deprecation mechanic — a 90-day
        window with a `Sunset` header (and `Deprecation: true`) on the
        old version, draining traffic before removal (ADR-040 §3)? The
        90-day figure and the `Sunset` header both need to appear to pass.
    - name: no_invented_rules
      weight: 25
      pass_threshold: 5
      dimensions: [PREF]
      prompt: |
        Does every cited rule map to ADR-040 or the Notion versioning
        how-to? Valid identifiers: ADR-040, /api/v1, /api/v2, additive-only,
        Sunset header, Deprecation header, 90-day window, URL-path
        versioning, checkout-api, bench-user-1, bench-user-9. Any other
        deprecation period (e.g. 30/60/180 days), header scheme, ADR
        number, or invented mechanic must fail this criterion.
