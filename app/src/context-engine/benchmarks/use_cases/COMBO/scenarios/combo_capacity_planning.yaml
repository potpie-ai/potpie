id: combo_capacity_planning
use_case: COMBO
tier: extended
difficulty: hard
source_mix: full
universe: acme
dimensions: [INFRA, TIME]

description: |
  A staff engineer asks the agent: "Plan capacity for Black Friday for
  checkout-api."

  A credible capacity plan is a composite of a topology lens and a trend
  lens:

    - INFRA side: the blast radius. checkout-api fans out to inventory-svc,
                  payments-svc, notifications-svc, auth-svc, and uses
                  checkout-prod-db (Postgres) + kafka(orders-topic). A
                  surge stresses every downstream — the agent must name
                  which dependencies are at capacity risk (the DB pool
                  ceiling, payments-svc capture latency, inventory-svc
                  reservation load) rather than treating checkout-api as
                  an island.
    - TIME side:  the recent load trend. The checkout-api saturation
                  monitor rose from 78% (14 days ago) to 91% (3 days ago)
                  at evening peak, and p99 latency is currently over SLO.
                  The agent must read this rising trend and extrapolate
                  toward a Black-Friday surge (last year peaked ~3.1x
                  normal), not just describe a static snapshot.

  The notion capacity-planning page ties these together and explicitly
  warns: any checkout-api worker scale-up must compute the pool-ceiling
  math and get DBA sign-off FIRST (ADR-045), to avoid repeating the
  OPS-389 mistake.

  Failure modes:
    - Names dependencies but ignores the rising load trend → TIME fails.
    - Recites the saturation numbers but never reasons about which
      downstream actually constrains the surge → INFRA fails.
    - Produces a plan with no concrete capacity actions → useless;
      integration criterion fails.

  `by_dimension` splits this into an INFRA score (dependency risk) and a
  TIME score (trend reading), with concrete actions as the integrator.

ingest:
  # Recent load trend (TIME) — rising saturation + current latency.
  - { event: alerting/checkout_load_trend_t14d.json, at: "-14d", tags: [signal] }
  - { event: alerting/checkout_load_trend_t3d.json, at: "-3d", tags: [signal] }
  - { event: alerting/checkout_p99_latency_open.json, at: "-3h", tags: [signal] }
  # Deploy context (INFRA/TIME) — current prod revision.
  - { event: deploy/checkout_prod_deploy_r7a3.json, at: "-6d", tags: [signal] }
  # The capacity-planning page that joins topology + trend (INFRA).
  - { event: notion/checkout_black_friday_capacity_plan.json, at: "-1d", tags: [signal] }

distractor_events:
  - { event: "noise/alerting_noise_template.json", at: "-20d..-1d", count: 18, shape: "noise/random" }
  - { event: "noise/github_chore_noise_template.json", at: "-20d..-1d", count: 14, shape: "noise/random" }

post_ingest_assertions:
  # NOTE (read-layer gating): INFRA is the structurally-gradeable
  # dimension — the topology read surfaces Service / DataStore +
  # DEPENDS_ON / USES, which is exactly the dependency blast-radius the
  # INFRA criteria reason about, so we anchor structural assertions there.
  # The TIME dimension (Alert trend / Deploy events) is reconciled but not
  # returned by the topology read path, so it is graded via the synthesis
  # judge + retrieval_assertions instead.
  graph_must_contain_entities:
    - { label: Service, key_pattern: "service:.*checkout-api", min_count: 1 }
    - { label: DataStore, key_pattern: "datastore:.*checkout-prod-db", min_count: 1 }
  graph_must_contain_edges:
    - { from_label: Service, to_label: Service, type: DEPENDS_ON, min_count: 1, dimensions: [INFRA] }
    - { from_label: Service, to_label: DataStore, type: USES, min_count: 1, dimensions: [INFRA] }
  graph_must_not_contain:
    - { label: Issue, key_pattern: "NOISE-.*", max_count: 0 }
  no_orphan_entities: false
  reconciliation:
    soft_downgrades_max: 6
    failed_events_max: 0

query:
  intent: planning
  scope: { service: checkout-api, event: "black-friday", task: capacity_planning }
  include: [infra_topology, timeline, decisions, owners, docs]
  mode: deep
  source_policy: summary

retrieval_assertions:
  required_includes_used: [infra_topology, timeline]
  source_refs_min: 3
  must_cite_event_id:
    - notion/checkout_black_friday_capacity_plan.json
    - alerting/checkout_load_trend_t3d.json
  must_not_cite_event_id:
    - noise/alerting_noise_template.json
    - noise/github_chore_noise_template.json
  forbid_in_answer:
    - "I don't have information"
    - "no capacity data"

judge:
  pass_score: 55
  criteria:
    # INFRA side ---
    - name: downstream_dependencies_at_risk
      weight: 25
      pass_threshold: 4
      dimensions: [INFRA]
      prompt: |
        Does the plan identify which downstream dependencies are at
        capacity risk under a checkout-api surge — checkout-prod-db
        (Postgres pool ceiling), payments-svc (capture latency),
        inventory-svc (reservation load), and kafka(orders-topic) —
        using checkout-api's actual dependency set rather than treating it
        as an isolated service? Naming the DB pool constraint specifically
        is required for full credit.
    - name: db_pool_constraint_called_out
      weight: 15
      pass_threshold: 3
      dimensions: [INFRA]
      prompt: |
        Does the plan call out that scaling checkout-api workers must
        respect the checkout-prod-db pool ceiling and follow ADR-045
        (+25% rule, DBA sign-off) — i.e. it does not naively recommend
        "add more workers" the way the OPS-389 expansion did?
    # TIME side ---
    - name: reads_recent_load_trend
      weight: 25
      pass_threshold: 4
      dimensions: [TIME]
      prompt: |
        Does the plan read the recent load trend — checkout-api saturation
        rising from ~78% (14 days ago) to ~91% (3 days ago) at evening
        peak, plus the currently-firing p99 latency alert — and
        extrapolate it toward the Black-Friday surge (last year ~3.1x
        normal peak)? A static snapshot with no trend/extrapolation fails.
    # Cross-dimension integration ---
    - name: concrete_capacity_actions
      weight: 25
      pass_threshold: 3
      prompt: |
        Does the plan give concrete, ordered capacity actions that tie the
        trend to the topology risk — e.g. load-test to ~3.5x peak in
        staging, compute pool-ceiling math + DBA sign-off BEFORE scaling
        workers, raise checkout-prod-db max_connections if needed, confirm
        payments-svc headroom for retry-amplified load, freeze deploys the
        week of? A descriptive risk summary with no actions fails.
    - name: grounded_no_hallucination
      weight: 10
      pass_threshold: 5
      prompt: |
        Are all claims grounded? Valid: checkout-api, inventory-svc,
        payments-svc, notifications-svc, auth-svc, checkout-prod-db,
        kafka orders-topic, ADR-045, OPS-389, PR #1238, bench-user-1,
        bench-user-3, bench-user-6, the 78%/91% saturation figures, the
        ~3.1x last-year peak. Invented services, numbers, or people fail.
