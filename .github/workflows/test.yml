name: Regression tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run static quality checks
        run: |
          uv lock --check
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t changed < <(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD")
          else
            mapfile -t changed < <(git diff --name-only --diff-filter=ACMRT "${{ github.event.before }}" "${{ github.sha }}")
          fi
          if [ "${#changed[@]}" -gt 0 ]; then
            uv run pre-commit run --files "${changed[@]}"
          fi

      - name: Run cargo clippy
        run: cargo clippy --manifest-path potpie/parsing/Cargo.toml --no-default-features -- -D warnings

  integrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run integrations package tests
        working-directory: potpie/integrations
        env:
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          ENV: "development"
        run: uv run --project . pytest tests

  ui-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build graph-explorer UI
        working-directory: potpie/context-engine/adapters/inbound/http/ui/frontend
        run: npm install && npm run build

  graph-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run FalkorDB graph e2e tests
        working-directory: potpie/context-engine
        env:
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          FALKORDB_URL: "redis://localhost:6379"
          FALKORDB_MODE: "server"
          GRAPH_DB_BACKEND: "falkordb"
          CONTEXT_GRAPH_ENABLED: "1"
          ENV: "development"
        run: |
          uv run --project . pytest \
            tests/integration/test_falkordb_server_e2e.py \
            tests/integration/test_falkordb_roundtrip.py \
            tests/integration/test_e2e_batching.py \
            tests/conformance/ \
            -v

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run benchmark harness unit tests
        working-directory: potpie/context-engine
        run: uv run --project . pytest tests/unit/benchmarks/ -v

  potpie-parsing:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run parsing_rs Rust tests
        env:
          PYO3_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: cargo test --manifest-path potpie/parsing/Cargo.toml --no-default-features

      - name: Check for Python package tests
        working-directory: potpie/parsing
        run: test ! -d tests || uv run --project . pytest tests

  potpie-context-engine:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run context-engine package tests
        working-directory: potpie/context-engine
        env:
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          ENV: "development"
        run: uv run --project . pytest tests

  potpie-sandbox:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run sandbox unit tests
        working-directory: potpie/sandbox
        run: uv run --project . --extra daytona pytest tests/unit

      - name: Run sandbox local integration tests
        working-directory: potpie/sandbox
        run: uv run --project . --extra daytona pytest tests/integration/test_docker_runtime.py tests/e2e/test_local_subprocess_e2e.py

  legacy-regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --no-cache

      # Parsing integration tests construct ParsingService → InferenceService, which
      # loads sentence-transformers/all-MiniLM-L6-v2 from the Hugging Face hub.
      - name: Cache Hugging Face hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-hub-${{ runner.os }}-all-MiniLM-L6-v2-v1
          restore-keys: |
            hf-hub-${{ runner.os }}-

      - name: Pre-download embedding model
        run: |
          uv sync --frozen --all-packages --no-cache
          uv run --project legacy python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2', device='cpu')"

      - name: Run test suite with coverage
        env:
          SKIP_REAL_PARSE: "1"
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          ENV: "development"
          REDISHOST: "localhost"
          REDISPORT: "6379"
          SENTRY_CLIENT_ID: "ci-dummy"
          SENTRY_CLIENT_SECRET: "ci-dummy"
          CONTEXT_GRAPH_JOB_QUEUE_BACKEND: "celery"
          CONTEXT_GRAPH_CELERY_QUEUE_MODULE: "app.modules.context_graph.celery_job_queue"
        run: uv sync --frozen --all-packages --no-cache && uv run --project legacy python legacy/scripts/run_tests.py --coverage

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
