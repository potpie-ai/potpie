name: Regression tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  potpie-parsing:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run parsing_rs Rust tests
        env:
          PYO3_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: cargo test --manifest-path potpie/parsing/Cargo.toml --no-default-features

      - name: Check for Python package tests
        working-directory: potpie/parsing
        run: test ! -d tests || uv run --project . pytest tests

  potpie-context-engine:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run context-engine package tests
        working-directory: potpie/context-engine
        env:
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          ENV: "development"
        run: uv run --project . pytest tests

  potpie-sandbox:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --all-packages --no-cache

      - name: Run sandbox unit tests
        working-directory: potpie/sandbox
        run: uv run --project . --extra daytona pytest tests/unit

      - name: Run sandbox local integration tests
        working-directory: potpie/sandbox
        run: uv run --project . --extra daytona pytest tests/integration/test_docker_runtime.py tests/e2e/test_local_subprocess_e2e.py

  legacy-regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.7"

      - name: Install dependencies
        run: uv sync --frozen --no-cache

      - name: Run test suite with coverage
        env:
          SKIP_REAL_PARSE: "1"
          POSTGRES_SERVER: "postgresql://postgres:postgres@localhost:5432/postgres"
          ENV: "development"
          REDISHOST: "localhost"
          REDISPORT: "6379"
          SENTRY_CLIENT_ID: "ci-dummy"
          SENTRY_CLIENT_SECRET: "ci-dummy"
          CONTEXT_GRAPH_JOB_QUEUE_BACKEND: "celery"
          CONTEXT_GRAPH_CELERY_QUEUE_MODULE: "app.modules.context_graph.celery_job_queue"
        run: uv sync --frozen --all-packages --no-cache && uv run --project legacy python legacy/scripts/run_tests.py --coverage

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
