[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "potpie-ai"
version = "0.1.0"
description = "Potpie core packages workspace (context-engine, parsing, sandbox, integrations)"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Potpie AI", email = "founders@potpie.ai" }]
maintainers = [{ name = "Potpie AI", email = "founders@potpie.ai" }]
keywords = ["ai", "agents", "code-intelligence", "knowledge-graph", "developer-tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
]
dependencies = [
    "potpie-context-engine[all]>=0.1.0,<0.2.0",
    "potpie-integrations>=0.1.0,<0.2.0",
    "potpie-parsing>=0.1.0,<0.2.0",
    "potpie-sandbox>=0.1.0,<0.2.0",
    "potpie-observability>=0.1.0,<0.2.0",
]

[project.urls]
Homepage = "https://potpie.ai"
Documentation = "https://docs.potpie.ai"
Source = "https://github.com/potpie-ai/potpie"
Issues = "https://github.com/potpie-ai/potpie/issues"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.uv]
# litellm>=1.83.10 clears CVE-2026-40217 (<1.83.10) but pins openai==2.24.0, which conflicts with
# pydantic-ai + context-engine; override to the root stack.
override-dependencies = ["python-dotenv>=1.2.2", "openai>=2.7.1", "idna>=3.15"]

[tool.uv.workspace]
members = ["potpie/*", "legacy"]

[tool.uv.sources]
potpie-parsing = { workspace = true }
potpie-context-engine = { workspace = true, editable = true }
potpie-integrations = { workspace = true, editable = true }
potpie-sandbox = { workspace = true, editable = true }
potpie-observability = { workspace = true, editable = true }
potpie-legacy = { workspace = true }

[dependency-groups]
dev = [
    "bandit>=1.8.6",
    "black>=26.3.1",
    "isort>=7.0.0",
    "pre-commit>=4.3.0",
    "pylint>=4.0.2",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.14.3",
]

[tool.bandit]
exclude_dirs = ["legacy/tests", "tests", "legacy/app/alembic"]
skips = ["B101", "B601", "B110", "B311", "B608"]

[tool.ruff]
exclude = ["legacy/app/alembic", "legacy/tests"]
