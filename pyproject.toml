[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "potpie"
version = "1.1.1"
description = "Potpie CLI and core package bundle."
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Potpie AI", email = "engineering@potpie.ai" }]
maintainers = [{ name = "Potpie AI", email = "engineering@potpie.ai" }]
keywords = ["ai", "agents", "code-intelligence", "knowledge-graph", "developer-tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
]
dependencies = [
    "potpie-context-engine[all]>=0.1.0,<0.2.0",
    "potpie-integrations>=0.1.0,<0.2.0",
    "potpie-parsing>=0.1.0,<0.2.0",
    "potpie-sandbox>=0.1.0,<0.2.0",
    "potpie-observability>=0.1.0,<0.2.0",
]

[project.scripts]
potpie = "adapters.inbound.cli.host_cli:main"
potpie-mcp = "adapters.inbound.mcp.server:main"
potpie-daemon = "host.daemon_main:main"

[project.urls]
Homepage = "https://potpie.ai"
Documentation = "https://docs.potpie.ai"
Source = "https://github.com/potpie-ai/potpie"
Issues = "https://github.com/potpie-ai/potpie/issues"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.sdist]
include = [
    "/LICENSE",
    "/README.md",
    "/pyproject.toml",
]
exclude = [
    "/.gitignore",
]

[tool.uv]
# litellm>=1.83.10 clears CVE-2026-40217 (<1.83.10) but pins openai==2.24.0, which conflicts with
# pydantic-ai + context-engine; override to the root stack.
override-dependencies = [
    "python-dotenv>=1.2.2",
    "openai>=2.7.1",
    "idna>=3.15",
    "cryptography>=48.0.1",
    "aiohttp>=3.14.1",
    "starlette>=1.3.1",
    "pyjwt>=2.13.0",
]

[tool.uv.workspace]
members = ["potpie/*"]

[tool.uv.sources]
potpie-parsing = { workspace = true }
potpie-context-engine = { workspace = true, editable = true }
potpie-integrations = { workspace = true, editable = true }
potpie-sandbox = { workspace = true, editable = true }
potpie-observability = { workspace = true, editable = true }

[dependency-groups]
dev = [
    "black>=26.3.1",
    "isort>=7.0.0",
    "pre-commit>=4.3.0",
    "pylint>=4.0.2",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.14.3",
]

[tool.ruff.lint]
extend-select = ["S"]
