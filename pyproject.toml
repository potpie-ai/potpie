[project]
name = "potpie"
version = "0.1.0"
description = "Potpie core packages workspace (context-engine, parsing, sandbox, integrations)"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "context-engine[all]",
    "potpie-integrations",
    "parsing",
    "potpie-sandbox",
    "observability",
]

[tool.uv]
# litellm>=1.83.10 clears CVE-2026-40217 (<1.83.10) but pins openai==2.24.0, which conflicts with
# pydantic-ai + context-engine; override to the root stack.
override-dependencies = ["python-dotenv>=1.2.2", "openai>=2.7.1", "idna>=3.15"]

[tool.uv.workspace]
members = ["potpie/*", "legacy"]

[tool.uv.sources]
parsing = { workspace = true }
context-engine = { workspace = true, editable = true }
potpie-integrations = { workspace = true, editable = true }
potpie-sandbox = { workspace = true, editable = true }
observability = { workspace = true, editable = true }
potpie-legacy = { workspace = true }

[dependency-groups]
dev = [
    "bandit>=1.8.6",
    "black>=26.3.1",
    "isort>=7.0.0",
    "pre-commit>=4.3.0",
    "pylint>=4.0.2",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.14.3",
]

[tool.bandit]
exclude_dirs = ["legacy/tests", "tests", "legacy/app/alembic"]
skips = ["B101", "B601", "B110", "B311", "B608"]

[tool.ruff]
exclude = ["legacy/app/alembic", "legacy/tests"]
