services:
  postgres:
    image: postgres:latest
    container_name: potpie_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: momentum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:latest
    container_name: potpie_neo4j
    environment:
      NEO4J_AUTH: neo4j/mysecretpassword
      NEO4JLABS_PLUGINS: '["apoc"]' # Add this line to include APOC plugin
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*" # Allow APOC procedures
      NEO4J_dbms_memory_transaction_total_max: 0
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: potpie_redis_broker
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # Lightweight local graph backend (opt-in alternative to Neo4j for the
  # context graph). Start with: docker compose --profile falkordb up falkordb
  # then set GRAPH_DB_BACKEND=falkordb and FALKORDB_URL=redis://localhost:6399.
  # Host port 6399 avoids clashing with the redis broker on 6379.
  falkordb:
    image: falkordb/falkordb:latest
    container_name: potpie_falkordb
    profiles: ["falkordb"]
    ports:
      - "6399:6379"
    volumes:
      - falkordb_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  falkordb_data:

networks:
  app-network:
    driver: bridge
